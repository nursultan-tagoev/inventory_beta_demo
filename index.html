<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>МКТ·СКЛАД — учёт товаров</title>
  <!-- React + Babel для JSX в браузере -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; }
    button { cursor:pointer; }
    input, select { outline: none; }
    table { border-collapse: collapse; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ---------- Константы ----------
    const CAT_COLOR = {
      "Одежда":"#f97316","Канцелярия":"#3b82f6","Электроника":"#8b5cf6",
      "Аксессуары":"#ec4899","Полиграфия":"#10b981","Прочее":"#64748b",
    };
    const CAT_ICON = {
      "Одежда":"👕","Канцелярия":"✏️","Электроника":"⚡",
      "Аксессуары":"🎒","Полиграфия":"📄","Прочее":"📦",
    };
    const CATEGORIES = Object.keys(CAT_COLOR);
    const CAT_PRICES = {"Одежда":850,"Канцелярия":120,"Электроника":3200,"Аксессуары":650,"Полиграфия":45,"Прочее":200};
    const PROD_SUGGESTIONS = {
      "Одежда":["Футболка белая L","Футболка чёрная M","Бейсболка","Худи с логотипом"],
      "Канцелярия":["Ручка с логотипом","Блокнот А5","Ежедневник","Маркер"],
      "Электроника":["Пауэрбанк 10000 mAh","USB-хаб","Флешка 32GB","Кабель USB-C"],
      "Аксессуары":["Шопер брендированный","Зонт брендированный","Значок","Брелок"],
      "Полиграфия":["Стикерпак","Листовка А4","Буклет","Плакат А3"],
      "Прочее":["Подарочный набор","Термос","Кружка","Брендированная маска"],
    };
    const BRANCHES = [{id:1,name:"Филиал 1",city:"Бишкек"},{id:2,name:"Филиал 2",city:"Ош"},{id:3,name:"Филиал 3",city:"Джалал-Абад"},{id:4,name:"Филиал 4",city:"Каракол"}];
    const LOCS = [{id:4,name:"A1·П1"},{id:5,name:"A1·П2"},{id:6,name:"A2·П1"},{id:7,name:"B1·П1"},{id:8,name:"B2·П1"}];
    const ROLES = {admin:"Администратор",manager:"Кладовщик",employee:"Сотрудник",director:"Руководитель"};
    const T_LABEL = {in:"Приход",out:"Выдача",return:"Возврат",writeoff:"Списание"};
    const T_COLOR = {in:"#16a34a",out:"#2563eb",return:"#7c3aed",writeoff:"#dc2626"};
    const T_BG    = {in:"#f0fdf4",out:"#eff6ff",return:"#faf5ff",writeoff:"#fef2f2"};
    const TODAY = new Date().toISOString().split("T")[0];
    const da = n => {const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split("T")[0];};
    const df = n => {const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];};
    const som = n => `${new Intl.NumberFormat("ru-RU").format(Math.round(n))} с`;

    const INIT_PRODUCTS = [
      {id:1,name:"Футболка белая L",    sku:"TSH-001",category:"Одежда",      price:850, locationId:4,archived:false},
      {id:2,name:"Ручка с логотипом",   sku:"PEN-001",category:"Канцелярия",  price:120, locationId:5,archived:false},
      {id:3,name:"Блокнот А5",          sku:"NTB-001",category:"Канцелярия",  price:180, locationId:5,archived:false},
      {id:4,name:"Пауэрбанк 10000 mAh",sku:"PWR-001",category:"Электроника", price:3200,locationId:6,archived:false},
      {id:5,name:"Бейсболка",           sku:"CAP-001",category:"Одежда",      price:650, locationId:4,archived:false},
      {id:6,name:"Шопер",               sku:"BAG-001",category:"Аксессуары",  price:420, locationId:7,archived:false},
      {id:7,name:"Стикерпак",           sku:"STK-001",category:"Полиграфия",  price:45,  locationId:8,archived:false},
    ];
    const INIT_MOVEMENTS = [
      {id:1, type:"in",      productId:1,qty:100,locationId:4,issuerId:1,date:da(30),notes:"Начальный приход"},
      {id:2, type:"in",      productId:2,qty:200,locationId:5,issuerId:1,date:da(28),notes:""},
      {id:3, type:"in",      productId:3,qty:150,locationId:5,issuerId:1,date:da(25),notes:""},
      {id:4, type:"in",      productId:4,qty:20, locationId:6,issuerId:1,date:da(20),notes:""},
      {id:5, type:"in",      productId:5,qty:50, locationId:4,issuerId:1,date:da(15),notes:""},
      {id:6, type:"in",      productId:6,qty:80, locationId:7,issuerId:1,date:da(15),notes:""},
      {id:7, type:"in",      productId:7,qty:300,locationId:8,issuerId:1,date:da(10),notes:""},
      {id:8, type:"out",     productId:1,qty:10, locationId:4,issuerId:1,recipientId:1,branchId:1,date:da(14),purpose:"Мероприятие",dueDate:da(7)},
      {id:9, type:"out",     productId:2,qty:50, locationId:5,issuerId:1,recipientId:2,branchId:2,date:da(10),purpose:"Выставка",   dueDate:da(3)},
      {id:10,type:"out",     productId:3,qty:20, locationId:5,issuerId:1,recipientId:3,branchId:3,date:da(5), purpose:"Партнёры",   dueDate:df(10)},
      {id:11,type:"out",     productId:5,qty:5,  locationId:4,issuerId:1,recipientId:4,branchId:4,date:da(8), purpose:"Конференция",dueDate:da(5)},
      {id:12,type:"out",     productId:7,qty:100,locationId:8,issuerId:1,recipientId:2,branchId:2,date:da(12),purpose:"Онбординг",  dueDate:df(5)},
      {id:13,type:"return",  productId:2,qty:20, locationId:5,issuerId:1,recipientId:2,branchId:2,date:da(2), condition:"хорошее",notes:""},
      {id:14,type:"writeoff",productId:1,qty:2,  locationId:4,issuerId:1,date:da(5),notes:"Брак"},
    ];
    const INIT_RECIPIENTS = [
      {id:1,name:"Тест 1",branchId:1},{id:2,name:"Тест 2",branchId:2},
      {id:3,name:"Тест 3",branchId:3},{id:4,name:"Тест 4",branchId:4},
    ];

    const LBL = {fontSize:11,color:"#9ca3af",display:"block",marginBottom:4,fontWeight:500};
    const INP = {width:"100%",padding:"8px 10px",border:"1px solid #e5e7eb",borderRadius:8,fontSize:12,
      background:"white",color:"#1f2937",boxSizing:"border-box",outline:"none"};

    // ---------- Иконки SVG ----------
    function IcoBox()     {return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>}
    function IcoActivity(){return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>}
    function IcoBranch()  {return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>}
    function IcoUsers()   {return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>}

    // ---------- Вспомогательные компоненты ----------
    function StatChip({label,value,color}) {
      return (
        <div style={{background:`${color}15`,borderRadius:8,padding:"5px 12px",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{fontSize:13,fontWeight:700,color}}>{value}</div>
          <div style={{fontSize:9,color:"#9ca3af",textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
        </div>
      );
    }

    function catBtn(active,color) {
      return {padding:"5px 12px",borderRadius:20,border:`1px solid ${active?color:"#e5e7eb"}`,fontSize:11,cursor:"pointer",
        background:active?color+"20":"white",color:active?color:"#6b7280",fontWeight:active?600:400};
    }

    // ---------- Компоненты приложения ----------
    function ItemCard({p,stock,can,addMov,showToast,activeCheckouts,recipients,onOpen}) {
      const [hover,setHover]     = useState(false);
      const [issuing,setIssuing] = useState(false);
      const [iform,setIform]     = useState({qty:1,recipientId:"",branchId:1,purpose:"",dueDate:""});
      const qty = stock[p.id]||0;
      const onHands = activeCheckouts.filter(c=>c.productId===p.id).reduce((a,c)=>a+c.remaining,0);

      const doIssue=()=>{
        if(!iform.recipientId){showToast("Выберите получателя",false);return;}
        const r=recipients.find(r=>r.id===Number(iform.recipientId));
        addMov({type:"out",productId:p.id,qty:Number(iform.qty),locationId:p.locationId,issuerId:1,
          recipientId:Number(iform.recipientId),branchId:r?.branchId||1,
          purpose:iform.purpose,dueDate:iform.dueDate,date:TODAY,notes:""});
        setIssuing(false);setIform({qty:1,recipientId:"",branchId:1,purpose:"",dueDate:""});
      };

      return (
        <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
          style={{background:"white",borderRadius:12,border:`1px solid ${hover?"#c7d2fe":"#e5e7eb"}`,
            overflow:"hidden",transition:"all 0.15s",boxShadow:hover?"0 4px 16px rgba(99,102,241,0.12)":"none",
            cursor:"pointer"}}>
          <div onClick={onOpen} style={{height:90,background:`linear-gradient(135deg,${CAT_COLOR[p.category]}22,${CAT_COLOR[p.category]}44)`,
            display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:4,position:"relative"}}>
            <span style={{fontSize:32}}>{CAT_ICON[p.category]}</span>
            <div style={{position:"absolute",top:8,right:8,background:"white",borderRadius:20,padding:"2px 8px",
              fontSize:11,fontWeight:700,color:qty===0?"#dc2626":qty<5?"#f59e0b":"#16a34a",
              boxShadow:"0 1px 4px rgba(0,0,0,0.1)"}}>
              {qty} шт
            </div>
            {onHands>0&&<div style={{position:"absolute",top:8,left:8,background:"#eff6ff",borderRadius:20,
              padding:"2px 7px",fontSize:10,fontWeight:600,color:"#3b82f6"}}>↑{onHands}</div>}
          </div>
          <div style={{padding:"10px 12px"}}>
            <div onClick={onOpen} style={{fontWeight:600,fontSize:13,color:"#1f2937",marginBottom:3,lineHeight:1.3,minHeight:32}}>{p.name}</div>
            <div style={{fontSize:11,color:"#9ca3af",marginBottom:8}}>{som(p.price)} · {LOCS.find(l=>l.id===p.locationId)?.name||"—"}</div>
            {can("move")&&!issuing&&(
              <div style={{display:"flex",gap:6}}>
                <button onClick={e=>{e.stopPropagation();setIssuing(true);}} style={{flex:1,background:"#6366f1",color:"white",border:"none",padding:"5px 0",borderRadius:6,fontSize:11,cursor:"pointer",fontWeight:600}}>Выдать</button>
                <button onClick={e=>{e.stopPropagation();addMov({type:"in",productId:p.id,qty:10,locationId:p.locationId,issuerId:1,date:TODAY,notes:"Приход"});showToast("+10 шт");}}
                  style={{background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0",padding:"5px 8px",borderRadius:6,fontSize:11,cursor:"pointer",fontWeight:600}}>+10</button>
              </div>
            )}
            {issuing&&(
              <div onClick={e=>e.stopPropagation()} style={{display:"flex",flexDirection:"column",gap:5}}>
                <select value={iform.recipientId} onChange={e=>setIform({...iform,recipientId:e.target.value})} style={{...INP,padding:"5px 7px",fontSize:11}}>
                  <option value="">Получатель...</option>
                  {recipients.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                </select>
                <div style={{display:"flex",gap:4}}>
                  <input type="number" min={1} max={qty} value={iform.qty} onChange={e=>setIform({...iform,qty:e.target.value})}
                    style={{...INP,width:60,padding:"5px 7px",fontSize:11,flex:1}}/>
                  <input type="date" value={iform.dueDate} onChange={e=>setIform({...iform,dueDate:e.target.value})}
                    style={{...INP,padding:"5px 7px",fontSize:11,flex:2}}/>
                </div>
                <input value={iform.purpose} onChange={e=>setIform({...iform,purpose:e.target.value})}
                  placeholder="Цель (необяз.)" style={{...INP,padding:"5px 7px",fontSize:11}}/>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={doIssue} style={{flex:1,background:"#6366f1",color:"white",border:"none",padding:"5px 0",borderRadius:6,fontSize:11,cursor:"pointer",fontWeight:600}}>✓ Выдать</button>
                  <button onClick={()=>setIssuing(false)} style={{background:"#f3f4f6",color:"#6b7280",border:"none",padding:"5px 8px",borderRadius:6,fontSize:11,cursor:"pointer"}}>✕</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function ItemModal({p,stock,movements,activeCheckouts,addMov,showToast,gr,can,onClose}) {
      const qty=stock[p.id]||0;
      const history=[...movements].filter(m=>m.productId===p.id).sort((a,b)=>b.date.localeCompare(a.date));
      const onHands=activeCheckouts.filter(c=>c.productId===p.id);
      const [rqty,setRqty]=useState(1);

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",
          justifyContent:"center",zIndex:100,padding:20}} onClick={onClose}>
          <div style={{background:"white",borderRadius:16,width:"100%",maxWidth:600,maxHeight:"90vh",overflow:"auto"}}
            onClick={e=>e.stopPropagation()}>
            <div style={{height:140,background:`linear-gradient(135deg,${CAT_COLOR[p.category]}33,${CAT_COLOR[p.category]}66)`,
              display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              <span style={{fontSize:56}}>{CAT_ICON[p.category]}</span>
              <button onClick={onClose} style={{position:"absolute",top:12,right:12,background:"rgba(255,255,255,0.8)",
                border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16}}>✕</button>
              <div style={{position:"absolute",bottom:12,right:12,background:"white",borderRadius:20,
                padding:"4px 14px",fontWeight:800,fontSize:20,color:qty===0?"#dc2626":qty<5?"#f59e0b":"#16a34a"}}>
                {qty} шт
              </div>
            </div>
            <div style={{padding:"16px 20px"}}>
              <div style={{fontWeight:700,fontSize:18,color:"#1f2937",marginBottom:4}}>{p.name}</div>
              <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                <span style={{background:CAT_COLOR[p.category]+"20",color:CAT_COLOR[p.category],padding:"2px 10px",borderRadius:10,fontSize:11,fontWeight:600}}>{p.category}</span>
                <span style={{background:"#f3f4f6",color:"#6b7280",padding:"2px 10px",borderRadius:10,fontSize:11}}>{p.sku}</span>
                <span style={{background:"#f3f4f6",color:"#6b7280",padding:"2px 10px",borderRadius:10,fontSize:11}}>{LOCS.find(l=>l.id===p.locationId)?.name}</span>
                <span style={{background:"#f3f4f6",color:"#6b7280",padding:"2px 10px",borderRadius:10,fontSize:11,fontWeight:600}}>{som(p.price)}</span>
              </div>

              {onHands.length>0&&(
                <div style={{background:"#eff6ff",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#3b82f6",marginBottom:6}}>НА РУКАХ ({onHands.reduce((a,c)=>a+c.remaining,0)} шт)</div>
                  {onHands.map((c,i)=>{
                    const isOD=c.dueDate&&c.dueDate<TODAY;
                    const days=c.dueDate?Math.floor((new Date()-new Date(c.dueDate))/86400000):null;
                    return (
                      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"4px 0",borderBottom:i<onHands.length-1?"1px solid #bfdbfe":"none"}}>
                        <span style={{fontSize:12,color:"#1e40af",fontWeight:500}}>{gr(c.recipientId)}</span>
                        <div style={{display:"flex",gap:8,alignItems:"center"}}>
                          <span style={{fontSize:12,fontWeight:700,color:"#2563eb"}}>{c.remaining} шт</span>
                          {isOD&&<span style={{fontSize:10,background:"#fef2f2",color:"#dc2626",padding:"1px 6px",borderRadius:4,fontWeight:700}}>+{days}д</span>}
                          {can("move")&&(
                            <button onClick={()=>{addMov({type:"return",productId:p.id,qty:c.remaining,locationId:p.locationId,
                              issuerId:1,recipientId:c.recipientId,branchId:c.branchId,date:TODAY,condition:"хорошее",notes:""});
                              showToast("Возврат оформлен");}} style={{background:"#7c3aed",color:"white",border:"none",
                              padding:"3px 8px",borderRadius:5,fontSize:10,cursor:"pointer",fontWeight:600}}>Вернуть</button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {can("move")&&(
                <div style={{display:"flex",gap:6,marginBottom:14}}>
                  <button onClick={()=>{addMov({type:"in",productId:p.id,qty:rqty,locationId:p.locationId,issuerId:1,date:TODAY,notes:"Приход"});showToast(`+${rqty} шт`);}}
                    style={{background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0",padding:"7px 14px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600}}>+ Приход</button>
                  <input type="number" min={1} value={rqty} onChange={e=>setRqty(Number(e.target.value))}
                    style={{...INP,width:70,textAlign:"center"}}/>
                  <button onClick={()=>{addMov({type:"writeoff",productId:p.id,qty:rqty,locationId:p.locationId,issuerId:1,date:TODAY,notes:"Списание"});showToast("Списано");}}
                    style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",padding:"7px 14px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600}}>Списать</button>
                </div>
              )}

              <div style={{fontSize:11,fontWeight:700,color:"#9ca3af",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>История ({history.length})</div>
              <div style={{maxHeight:180,overflow:"auto"}}>
                {history.map((m,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",
                    borderBottom:"1px solid #f3f4f6"}}>
                    <span style={{background:T_BG[m.type],color:T_COLOR[m.type],padding:"2px 8px",borderRadius:6,fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{T_LABEL[m.type]}</span>
                    <span style={{fontWeight:600,color:"#374151"}}>×{m.qty}</span>
                    {m.recipientId&&<span style={{fontSize:11,color:"#6b7280"}}>{gr(m.recipientId)}</span>}
                    {m.purpose&&<span style={{fontSize:11,color:"#9ca3af"}}>{m.purpose}</span>}
                    <span style={{marginLeft:"auto",fontSize:10,color:"#9ca3af",fontFamily:"monospace"}}>{m.date}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ItemsView({products,setProducts,stock,can,addMov,showToast,movements,activeCheckouts,gr,recipients}) {
      const [search,setSearch]   = useState("");
      const [catFilter,setCatF]  = useState("all");
      const [viewMode,setVM]     = useState("grid");
      const [showAdd,setShowAdd] = useState(false);
      const [selItem,setSelItem] = useState(null);
      const [form,setForm]       = useState({name:"",sku:"",category:"Одежда",price:CAT_PRICES["Одежда"],qty:0,locationId:4});

      const filtered = products.filter(p=>!p.archived
        &&(catFilter==="all"||p.category===catFilter)
        &&(!search||p.name.toLowerCase().includes(search.toLowerCase())||p.sku.toLowerCase().includes(search.toLowerCase())));

      const handleCat = cat=>setForm(f=>({...f,category:cat,price:CAT_PRICES[cat]||200,name:""}));

      const saveProduct = ()=>{
        if(!form.name.trim()){showToast("Укажите название",false);return;}
        const newId=Math.max(0,...products.map(p=>p.id))+1;
        setProducts(p=>[...p,{...form,id:newId,price:Number(form.price),locationId:Number(form.locationId),archived:false,sku:form.sku||`SKU-${newId}`}]);
        if(Number(form.qty)>0) addMov({type:"in",productId:newId,qty:Number(form.qty),locationId:Number(form.locationId),issuerId:1,date:TODAY,notes:"Начальный остаток"});
        setShowAdd(false);setForm({name:"",sku:"",category:"Одежда",price:CAT_PRICES["Одежда"],qty:0,locationId:4});
        showToast("Товар добавлен");
      };

      const totalItems = products.filter(p=>!p.archived).length;
      const totalQty   = Object.values(stock).reduce((a,b)=>a+b,0);
      const totalVal   = products.filter(p=>!p.archived).reduce((a,p)=>a+(stock[p.id]||0)*p.price,0);

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
          <div style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"14px 20px",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <div style={{flex:1,position:"relative"}}>
                <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#9ca3af"}}>🔍</span>

                  style={{width:"100%",padding:"8px 10px 8px 32px",border:"1px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box",background:"#f9fafb"}}/>

              <div style={{display:"flex",border:"1px solid #e5e7eb",borderRadius:8,overflow:"hidden"}}>

              {can("edit")&&(

          </div>

          <div style={{flex:1,overflow:"auto",padding:20}}>
            {showAdd&&can("edit")&&(
              <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",padding:18,marginBottom:18,boxShadow:"0 4px 16px rgba(0,0,0,0.06)"}}>
                <div style={{fontWeight:700,fontSize:14,color:"#1f2937",marginBottom:14}}>Новый товар</div>
                <div style={{marginBottom:12}}>

                        background:form.category===cat?CAT_COLOR[cat]:"white",
                        borderColor:form.category===cat?CAT_COLOR[cat]:"#e5e7eb",
                        color:form.category===cat?"white":"#374151"}}>
                        {CAT_ICON[cat]} {cat}
                      </button>
                    ))}
                  </div>
                </div>
                {(PROD_SUGGESTIONS[form.category]||[]).length>0&&(
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:11,color:"#9ca3af",marginBottom:7,textTransform:"uppercase",letterSpacing:0.5}}>Быстрый выбор</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {(PROD_SUGGESTIONS[form.category]||[]).map(s=>(
                        <button key={s} onClick={()=>setForm(f=>({...f,name:s}))} style={{padding:"5px 12px",borderRadius:20,
                          border:"1px solid",fontSize:12,cursor:"pointer",
                          background:form.name===s?"#eff6ff":"#f9fafb",
                          borderColor:form.name===s?"#6366f1":"#e5e7eb",
                          color:form.name===s?"#6366f1":"#374151"}}>{s}</button>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:10}}>
                  {[["Название","text","name","Введите название"],
                    ["Артикул","text","sku","Авто"],
                    ["Цена (сом)","number","price",""],
                    ["Начальный остаток","number","qty","0"]].map(([l,t,k,ph])=>(
                    <div key={k}>
                      <div style={LBL}>{l}</div>
                      <input type={t} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})}
                        placeholder={ph} style={INP}/>
                    </div>
                  ))}
                  <div>
                    <div style={LBL}>Место</div>
                    <select value={form.locationId} onChange={e=>setForm({...form,locationId:Number(e.target.value)})} style={INP}>
                      {LOCS.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:14}}>
                  <button onClick={saveProduct} style={{background:"#6366f1",color:"white",border:"none",padding:"8px 20px",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600}}>Сохранить</button>
                  <button onClick={()=>setShowAdd(false)} style={{background:"#f3f4f6",color:"#374151",border:"none",padding:"8px 16px",borderRadius:8,fontSize:13,cursor:"pointer"}}>Отмена</button>
                </div>
              </div>
            )}

            {filtered.length===0&&<div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>
              <div style={{fontSize:48,marginBottom:12}}>📦</div>
              <div style={{fontSize:14,fontWeight:600,color:"#374151"}}>Товаров нет</div>
              <div style={{fontSize:12,marginTop:4}}>{search?"Попробуйте другой запрос":"Добавьте первый товар"}</div>
            </div>}

            {viewMode==="grid"
              ? <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:14}}>
                  {filtered.map(p=>(
                    <ItemCard key={p.id} p={p} stock={stock} can={can} addMov={addMov} showToast={showToast}
                      activeCheckouts={activeCheckouts} recipients={recipients} onOpen={()=>setSelItem(p)}/>
                  ))}
                </div>
              : <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead><tr style={{borderBottom:"2px solid #f3f4f6",background:"#f9fafb"}}>
                      {["","Название","Категория","Артикул","Цена","Остаток","Стоимость",""].map((h,i)=>(
                        <th key={i} style={{padding:"10px 14px",textAlign:"left",fontSize:11,color:"#9ca3af",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {filtered.map((p,i)=>{
                        const qty=stock[p.id]||0;
                        return (
                          <tr key={p.id} style={{borderBottom:"1px solid #f3f4f6",background:i%2?"#fafafa":"white",cursor:"pointer"}}
                            onClick={()=>setSelItem(p)}>
                            <td style={{padding:"10px 14px"}}>
                              <div style={{width:32,height:32,borderRadius:8,background:CAT_COLOR[p.category]+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{CAT_ICON[p.category]}</div>
                            </td>
                            <td style={{padding:"10px 14px",fontWeight:600,color:"#1f2937"}}>{p.name}</td>
                            <td style={{padding:"10px 14px"}}><span style={{background:CAT_COLOR[p.category]+"20",color:CAT_COLOR[p.category],padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600}}>{p.category}</span></td>
                            <td style={{padding:"10px 14px",color:"#9ca3af",fontFamily:"monospace",fontSize:11}}>{p.sku}</td>
                            <td style={{padding:"10px 14px",color:"#374151"}}>{som(p.price)}</td>
                            <td style={{padding:"10px 14px"}}>
                              <span style={{fontWeight:700,fontSize:15,color:qty===0?"#dc2626":qty<5?"#f59e0b":"#16a34a"}}>{qty}</span>
                              <span style={{color:"#9ca3af",fontSize:10}}> шт</span>
                            </td>
                            <td style={{padding:"10px 14px",fontWeight:600,color:"#374151"}}>{som(qty*p.price)}</td>
                            <td style={{padding:"10px 14px"}}>
                              <span style={{color:"#9ca3af",fontSize:11}}>{LOCS.find(l=>l.id===p.locationId)?.name||"—"}</span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
            }
          </div>

          {selItem&&<ItemModal p={selItem} stock={stock} movements={movements} activeCheckouts={activeCheckouts}
            addMov={addMov} showToast={showToast} gr={gr} can={can}
            onClose={()=>setSelItem(null)}/>}
        </div>
      );
    }

    function ActivityView({movements,products,overdue,can,addMov,showToast,gp,gr,gb,recipients}) {
      const [typeF,setTypeF]   = useState("all");
      const [search,setSearch] = useState("");
      const [form,setForm]     = useState(null);

      const sorted=[...movements]
        .filter(m=>(typeF==="all"||m.type===typeF)
          &&(!search||(gp(m.productId)+gr(m.recipientId||0)+(m.purpose||"")).toLowerCase().includes(search.toLowerCase())))
        .sort((a,b)=>b.date.localeCompare(a.date));

      const openForm=type=>setForm({type,productId:"",qty:1,recipientId:"",branchId:1,purpose:"",dueDate:"",condition:"хорошее",notes:""});

      const submit=()=>{
        if(!form.productId){showToast("Выберите товар",false);return;}
        const r=recipients.find(r=>r.id===Number(form.recipientId));
        addMov({...form,productId:Number(form.productId),qty:Number(form.qty),
          issuerId:1,recipientId:Number(form.recipientId)||undefined,
          branchId:r?.branchId||Number(form.branchId),
          locationId:products.find(p=>p.id===Number(form.productId))?.locationId,date:TODAY});
        setForm(null);
      };

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
          <div style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"14px 20px",flexShrink:0}}>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:16,fontWeight:700,color:"#1f2937"}}>Движения товаров</div>
              {can("move")&&(
                <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                  {[{t:"out",l:"↑ Выдать",c:"#6366f1"},{t:"return",l:"↓ Возврат",c:"#7c3aed"},{t:"writeoff",l:"✕ Списать",c:"#dc2626"},{t:"in",l:"+ Приход",c:"#16a34a"}].map(op=>(
                    <button key={op.t} onClick={()=>openForm(op.t)} style={{background:op.c,color:"white",border:"none",padding:"7px 14px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600}}>{op.l}</button>
                  ))}
                </div>
              )}
            </div>
            {overdue.length>0&&(
              <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"8px 14px",marginBottom:12,fontSize:12,color:"#dc2626",fontWeight:600}}>
                ⚠ {overdue.length} выдач просрочено — требуется возврат
              </div>
            )}
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {["all","out","in","return","writeoff"].map(t=>(
                <button key={t} onClick={()=>setTypeF(t)} style={{padding:"5px 12px",borderRadius:20,border:"1px solid",fontSize:11,cursor:"pointer",
                  background:typeF===t?"#1a1d2e":"white",borderColor:typeF===t?"#1a1d2e":"#e5e7eb",
                  color:typeF===t?"white":"#6b7280",fontWeight:typeF===t?600:400}}>
                  {t==="all"?"Все":T_LABEL[t]}
                </button>
              ))}
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск..."
                style={{...INP,width:180,marginLeft:"auto"}}/>
            </div>
          </div>

          <div style={{flex:1,overflow:"auto",padding:20}}>
            {form&&(
              <div style={{background:"white",borderRadius:12,border:`2px solid ${T_COLOR[form.type]}`,padding:18,marginBottom:16}}>
                <div style={{fontWeight:700,fontSize:14,color:T_COLOR[form.type],marginBottom:14}}>{T_LABEL[form.type]}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                  <div><div style={LBL}>Товар</div>
                    <select value={form.productId} onChange={e=>setForm({...form,productId:e.target.value})} style={INP}>
                      <option value="">— выбрать —</option>
                      {products.filter(p=>!p.archived).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                    </select>
                  </div>
                  <div><div style={LBL}>Количество</div><input type="number" min={1} value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})} style={INP}/></div>
                  {(form.type==="out"||form.type==="return")&&<>
                    <div><div style={LBL}>{form.type==="out"?"Получатель":"Возврат от"}</div>
                      <select value={form.recipientId} onChange={e=>setForm({...form,recipientId:e.target.value})} style={INP}>
                        <option value="">— выбрать —</option>
                        {recipients.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                      </select>
                    </div>
                    <div><div style={LBL}>Филиал</div>
                      <select value={form.branchId} onChange={e=>setForm({...form,branchId:e.target.value})} style={INP}>
                        {BRANCHES.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
                      </select>
                    </div>
                  </>}
                  {form.type==="out"&&<>
                    <div><div style={LBL}>Цель</div><input value={form.purpose} onChange={e=>setForm({...form,purpose:e.target.value})} placeholder="Мероприятие..." style={INP}/></div>
                    <div><div style={LBL}>Вернуть до</div><input type="date" value={form.dueDate} onChange={e=>setForm({...form,dueDate:e.target.value})} style={INP}/></div>
                  </>}
                  {form.type==="return"&&<div><div style={LBL}>Состояние</div>
                    <select value={form.condition} onChange={e=>setForm({...form,condition:e.target.value})} style={INP}>
                      <option value="хорошее">Хорошее</option><option value="б/у">Б/у</option><option value="брак">Брак</option>
                    </select>
                  </div>}
                  <div><div style={LBL}>Примечание</div><input value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={INP}/></div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:14}}>
                  <button onClick={submit} style={{background:T_COLOR[form.type],color:"white",border:"none",padding:"8px 20px",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600}}>Сохранить</button>
                  <button onClick={()=>setForm(null)} style={{background:"#f3f4f6",color:"#374151",border:"none",padding:"8px 16px",borderRadius:8,fontSize:13,cursor:"pointer"}}>Отмена</button>
                </div>
              </div>
            )}

            <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden"}}>
              <div style={{padding:"8px 16px",borderBottom:"1px solid #f3f4f6",fontSize:11,color:"#9ca3af"}}>Записей: {sorted.length}</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{borderBottom:"2px solid #f3f4f6",background:"#f9fafb"}}>
                  {["Дата","Тип","Товар","Шт","Кому","Филиал","Цель / Примечание"].map(h=>(
                    <th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:11,color:"#9ca3af",fontWeight:600}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {sorted.map((m,i)=>(
                    <tr key={m.id} style={{borderBottom:"1px solid #f3f4f6",background:i%2?"#fafafa":"white"}}>
                      <td style={{padding:"9px 14px",color:"#9ca3af",fontSize:11,fontFamily:"monospace"}}>{m.date}</td>
                      <td style={{padding:"9px 14px"}}><span style={{background:T_BG[m.type],color:T_COLOR[m.type],padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:600}}>{T_LABEL[m.type]}</span></td>
                      <td style={{padding:"9px 14px",fontWeight:600,color:"#1f2937"}}>{gp(m.productId)}</td>
                      <td style={{padding:"9px 14px",fontWeight:700,color:"#374151"}}>×{m.qty}</td>
                      <td style={{padding:"9px 14px",color:"#6b7280",fontSize:12}}>{m.recipientId?gr(m.recipientId):"—"}</td>
                      <td style={{padding:"9px 14px"}}>{m.branchId?<span style={{background:"#eff6ff",color:"#3b82f6",padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:500}}>{gb(m.branchId)}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                      <td style={{padding:"9px 14px",color:"#9ca3af",fontSize:12}}>{m.purpose||m.notes||(m.condition?`Состояние: ${m.condition}`:"—")}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    function BranchesView({activeCheckouts,gp,gr,products}) {
      const [sel,setSel]=useState(1);
      const bOuts=activeCheckouts.filter(c=>c.branchId===sel);
      const byRec={};
      bOuts.forEach(c=>{if(!byRec[c.recipientId])byRec[c.recipientId]=[];byRec[c.recipientId].push(c);});
      const totalQty=bOuts.reduce((a,c)=>a+c.remaining,0);
      const totalVal=bOuts.reduce((a,c)=>a+(products.find(p=>p.id===c.productId)?.price||0)*c.remaining,0);

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
          <div style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"14px 20px",flexShrink:0}}>
            <div style={{fontSize:16,fontWeight:700,color:"#1f2937",marginBottom:12}}>Филиалы — кто что взял</div>
            <div style={{display:"flex",gap:6}}>
              {BRANCHES.map(b=>{
                const cnt=activeCheckouts.filter(c=>c.branchId===b.id).reduce((a,c)=>a+c.remaining,0);
                return (
                  <button key={b.id} onClick={()=>setSel(b.id)} style={{padding:"8px 18px",borderRadius:10,border:"1px solid",
                    fontSize:13,cursor:"pointer",fontWeight:600,
                    background:sel===b.id?"#1a1d2e":"white",borderColor:sel===b.id?"#1a1d2e":"#e5e7eb",
                    color:sel===b.id?"white":"#374151",display:"flex",alignItems:"center",gap:8}}>
                    {b.name}
                    {cnt>0&&<span style={{background:sel===b.id?"#3b82f6":"#dbeafe",color:sel===b.id?"white":"#1d4ed8",
                      borderRadius:10,padding:"0 7px",fontSize:11,fontWeight:700}}>{cnt}</span>}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{flex:1,overflow:"auto",padding:20}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
              {[
                {v:totalQty,l:"единиц на руках",c:"#6366f1"},
                {v:som(totalVal),l:"стоимость выданного",c:"#10b981"},
                {v:Object.keys(byRec).length,l:"получателей",c:"#f59e0b"},
              ].map((k,i)=>(
                <div key={i} style={{background:"white",borderRadius:10,border:"1px solid #e5e7eb",padding:"14px 16px",borderTop:`3px solid ${k.c}`}}>
                  <div style={{fontSize:22,fontWeight:800,color:k.c}}>{k.v}</div>
                  <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{k.l}</div>
                </div>
              ))}
            </div>

            {bOuts.length===0&&(
              <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",padding:40,textAlign:"center",color:"#9ca3af"}}>
                <div style={{fontSize:32,marginBottom:8}}>✓</div>
                <div style={{fontSize:14,fontWeight:600,color:"#374151"}}>Нет активных выдач</div>
              </div>
            )}

            {Object.entries(byRec).map(([rid,items])=>{
              const pQty=items.reduce((a,c)=>a+c.remaining,0);
              const pVal=items.reduce((a,c)=>a+(products.find(p=>p.id===c.productId)?.price||0)*c.remaining,0);
              return (
                <div key={rid} style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",marginBottom:12,overflow:"hidden"}}>
                  <div style={{padding:"12px 16px",borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#f9fafb"}}>
                    <div style={{fontWeight:700,fontSize:14,color:"#1f2937"}}>{gr(Number(rid))}</div>
                    <div style={{display:"flex",gap:8}}>
                      <span style={{background:"#eff6ff",color:"#2563eb",padding:"3px 10px",borderRadius:8,fontSize:12,fontWeight:700}}>{pQty} шт</span>
                      <span style={{background:"#f0fdf4",color:"#16a34a",padding:"3px 10px",borderRadius:8,fontSize:12,fontWeight:700}}>{som(pVal)}</span>
                    </div>
                  </div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead><tr style={{borderBottom:"1px solid #f3f4f6"}}>
                      {["Товар","Кол-во","Стоимость","Выдано","Вернуть до","Статус","Цель"].map(h=>(
                        <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:11,color:"#9ca3af",fontWeight:600}}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {items.map((c,i)=>{
                        const isOD=c.dueDate&&c.dueDate<TODAY;
                        const days=c.dueDate?Math.floor((new Date()-new Date(c.dueDate))/86400000):null;
                        const price=products.find(p=>p.id===c.productId)?.price||0;
                        return (
                          <tr key={i} style={{borderBottom:"1px solid #f3f4f6",background:isOD?"#fff8f8":"white"}}>
                            <td style={{padding:"9px 14px",fontWeight:500,color:"#1f2937"}}>{gp(c.productId)}</td>
                            <td style={{padding:"9px 14px",fontWeight:700,color:"#2563eb"}}>{c.remaining}</td>
                            <td style={{padding:"9px 14px",fontSize:12,color:"#374151"}}>{som(c.remaining*price)}</td>
                            <td style={{padding:"9px 14px",color:"#9ca3af",fontFamily:"monospace",fontSize:11}}>{c.date}</td>
                            <td style={{padding:"9px 14px",color:"#9ca3af",fontFamily:"monospace",fontSize:11}}>{c.dueDate||"—"}</td>
                            <td style={{padding:"9px 14px"}}>
                              {isOD
                                ?<span style={{background:"#fef2f2",color:"#dc2626",padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:700}}>+{days} дн</span>
                                :<span style={{background:"#f0fdf4",color:"#16a34a",padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:600}}>В срок</span>}
                            </td>
                            <td style={{padding:"9px 14px",color:"#9ca3af",fontSize:12}}>{c.purpose||"—"}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function UsersView({users,setUsers,can,recipients,setRec,showToast,currentUser}) {
      const [tab,setTab]     = useState("users");
      const [uform,setUform] = useState({name:"",role:"employee"});
      const [rform,setRform] = useState({name:"",branchId:1});

      const addUser=()=>{
        if(!uform.name.trim()){showToast("Введите имя",false);return;}
        const id=Math.max(0,...users.map(u=>u.id))+1;
        setUsers(p=>[...p,{id,...uform,branchId:1}]);
        setUform({name:"",role:"employee"});showToast("Пользователь добавлен");
      };
      const removeUser=id=>{
        if(id===currentUser.id){showToast("Нельзя удалить себя",false);return;}
        if(users.length<=1){showToast("Должен быть хотя бы один пользователь",false);return;}
        setUsers(p=>p.filter(u=>u.id!==id));showToast("Удалён");
      };
      const addRec=()=>{
        if(!rform.name.trim()){showToast("Введите имя",false);return;}
        const id=Math.max(0,...recipients.map(r=>r.id))+1;
        setRec(p=>[...p,{id,...rform,branchId:Number(rform.branchId)}]);
        setRform({name:"",branchId:1});showToast("Получатель добавлен");
      };
      const removeRec=id=>{setRec(p=>p.filter(r=>r.id!==id));showToast("Удалён");};

      const ROLE_COLORS={admin:["#fef3c7","#92400e"],director:["#ede9fe","#5b21b6"],manager:["#dbeafe","#1e40af"],employee:["#f0fdf4","#166534"]};

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
          <div style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"14px 20px",flexShrink:0}}>
            <div style={{fontSize:16,fontWeight:700,color:"#1f2937",marginBottom:12}}>Управление</div>
            <div style={{display:"flex",gap:6}}>
              {[["users","Пользователи системы"],["recipients","Получатели товаров"]].map(([v,l])=>(
                <button key={v} onClick={()=>setTab(v)} style={{padding:"7px 16px",borderRadius:8,border:"1px solid",
                  fontSize:12,cursor:"pointer",fontWeight:600,
                  background:tab===v?"#1a1d2e":"white",borderColor:tab===v?"#1a1d2e":"#e5e7eb",
                  color:tab===v?"white":"#374151"}}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{flex:1,overflow:"auto",padding:20}}>
            {tab==="users"&&(
              <div>
                {can("admin")&&(
                  <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",padding:16,marginBottom:16}}>
                    <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:12}}>Добавить пользователя</div>
                    <div style={{display:"grid",gridTemplateColumns:"2fr 1fr auto",gap:10,alignItems:"end"}}>
                      <div><div style={LBL}>Имя / Логин</div><input value={uform.name} onChange={e=>setUform({...uform,name:e.target.value})} placeholder="Введите имя" style={INP}/></div>
                      <div><div style={LBL}>Роль</div>
                        <select value={uform.role} onChange={e=>setUform({...uform,role:e.target.value})} style={INP}>
                          {Object.entries(ROLES).map(([v,l])=><option key={v} value={v}>{l}</option>)}
                        </select>
                      </div>
                      <button onClick={addUser} style={{background:"#6366f1",color:"white",border:"none",padding:"8px 18px",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600}}>+ Добавить</button>
                    </div>
                  </div>
                )}
                <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden"}}>
                  {users.map((u,i)=>(
                    <div key={u.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",
                      borderBottom:i<users.length-1?"1px solid #f3f4f6":"none",background:i%2?"#fafafa":"white"}}>
                      <div style={{width:36,height:36,borderRadius:10,background:"#6366f1",display:"flex",alignItems:"center",
                        justifyContent:"center",color:"white",fontWeight:700,fontSize:14,flexShrink:0}}>
                        {u.name.charAt(0).toUpperCase()}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,color:"#1f2937",fontSize:13}}>{u.name}</div>
                        <div style={{fontSize:11,color:"#9ca3af",marginTop:1}}>ID {u.id}</div>
                      </div>
                      <span style={{background:ROLE_COLORS[u.role]?.[0]||"#f3f4f6",color:ROLE_COLORS[u.role]?.[1]||"#374151",
                        padding:"3px 10px",borderRadius:8,fontSize:11,fontWeight:600}}>{ROLES[u.role]}</span>
                      {can("admin")&&u.id!==currentUser.id&&(
                        <button onClick={()=>removeUser(u.id)} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",
                          padding:"5px 10px",borderRadius:7,fontSize:11,cursor:"pointer",fontWeight:600}}>Удалить</button>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab==="recipients"&&(
              <div>
                {can("edit")&&(
                  <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",padding:16,marginBottom:16}}>
                    <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:12}}>Добавить получателя</div>
                    <div style={{display:"grid",gridTemplateColumns:"2fr 1fr auto",gap:10,alignItems:"end"}}>
                      <div><div style={LBL}>Имя получателя</div><input value={rform.name} onChange={e=>setRform({...rform,name:e.target.value})} placeholder="Имя, отдел..." style={INP}/></div>
                      <div><div style={LBL}>Филиал</div>
                        <select value={rform.branchId} onChange={e=>setRform({...rform,branchId:e.target.value})} style={INP}>
                          {BRANCHES.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
                        </select>
                      </div>
                      <button onClick={addRec} style={{background:"#10b981",color:"white",border:"none",padding:"8px 18px",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600}}>+ Добавить</button>
                    </div>
                  </div>
                )}
                <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden"}}>
                  {recipients.map((r,i)=>(
                    <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",
                      borderBottom:i<recipients.length-1?"1px solid #f3f4f6":"none",background:i%2?"#fafafa":"white"}}>
                      <div style={{width:36,height:36,borderRadius:10,background:"#10b981",display:"flex",alignItems:"center",
                        justifyContent:"center",color:"white",fontWeight:700,fontSize:14,flexShrink:0}}>
                        {r.name.charAt(0).toUpperCase()}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,color:"#1f2937",fontSize:13}}>{r.name}</div>
                        <div style={{fontSize:11,color:"#9ca3af",marginTop:1}}>{BRANCHES.find(b=>b.id===r.branchId)?.name||"—"}</div>
                      </div>
                      {can("edit")&&(
                        <button onClick={()=>removeRec(r.id)} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",
                          padding:"5px 10px",borderRadius:7,fontSize:11,cursor:"pointer",fontWeight:600}}>Удалить</button>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ---------- Главный компонент ----------
    function App() {
      const [users,setUsers]         = useState([{id:1,name:"Айгерим",role:"admin",branchId:1}]);
      const [currentUser,setCU]      = useState({id:1,name:"Айгерим",role:"admin",branchId:1});
      const [products,setProducts]   = useState(INIT_PRODUCTS);
      const [movements,setMov]       = useState(INIT_MOVEMENTS);
      const [recipients,setRec]      = useState(INIT_RECIPIENTS);
      const [view,setView]           = useState("items");
      const [uid,setUid]             = useState(50);
      const [toast,setToast]         = useState(null);

      const showToast = (msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2200);};

      const stock = useMemo(()=>{
        const s={};
        movements.forEach(m=>{
          if(!s[m.productId])s[m.productId]=0;
          if(m.type==="in"||m.type==="return")s[m.productId]+=m.qty;
          else if(m.type==="out"||m.type==="writeoff")s[m.productId]-=m.qty;
        });
        return s;
      },[movements]);

      const activeCheckouts = useMemo(()=>{
        const map={};
        movements.forEach(m=>{
          if(m.type==="out"){map[m.id]={...m,remaining:m.qty};}
        });
        movements.forEach(m=>{
          if(m.type==="return"){
            let left=m.qty;
            Object.values(map).filter(o=>o.productId===m.productId&&o.recipientId===m.recipientId&&o.remaining>0)
              .sort((a,b)=>a.date.localeCompare(b.date))
              .forEach(o=>{if(left>0){const t=Math.min(left,o.remaining);o.remaining-=t;left-=t;}});
          }
        });
        return Object.values(map).filter(o=>o.remaining>0);
      },[movements]);

      const overdue = useMemo(()=>activeCheckouts.filter(c=>c.dueDate&&c.dueDate<TODAY),[activeCheckouts]);

      const addMov = mov=>{setMov(p=>[...p,{...mov,id:uid}]);setUid(n=>n+1);};
      const gp = id=>products.find(p=>p.id===id)?.name??"—";
      const gr = id=>recipients.find(r=>r.id===id)?.name??"—";
      const gb = id=>BRANCHES.find(b=>b.id===id)?.name??"—";
      const can = a=>{ const r=currentUser.role; if(a==="admin")return r==="admin"; if(a==="edit")return r==="admin"||r==="manager"; if(a==="move")return r==="admin"||r==="manager"; return true; };

      const NAV = [
        {id:"items",    label:"Товары",       icon:<IcoBox/>},
        {id:"activity", label:"Движения",     icon:<IcoActivity/>, badge:overdue.length},
        {id:"branches", label:"Филиалы",      icon:<IcoBranch/>},
        {id:"users",    label:"Управление",   icon:<IcoUsers/>},
      ];

      const shared = {users,setUsers,products,setProducts,stock,movements,setMov,activeCheckouts,overdue,
        addMov,can,gp,gr,gb,currentUser,recipients,setRec,showToast};

      return (
        <div style={{display:"flex",height:"100vh",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:"#f5f6fa",overflow:"hidden"}}>
          <aside style={{width:220,background:"#1a1d2e",display:"flex",flexDirection:"column",flexShrink:0}}>
            <div style={{padding:"20px 16px 16px",borderBottom:"1px solid #2a2d3e"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📦</div>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:"white",letterSpacing:-0.3}}>МКТ·СКЛАД</div>
                  <div style={{fontSize:10,color:"#4a5568",marginTop:1}}>учёт товаров</div>
                </div>
              </div>
            </div>

            <div style={{padding:"8px 8px",flex:1,overflowY:"auto"}}>
              {NAV.map(item=>{
                const active=view===item.id;
                return (
                  <button key={item.id} onClick={()=>setView(item.id)} style={{
                    display:"flex",alignItems:"center",gap:10,width:"100%",padding:"9px 12px",marginBottom:2,
                    background:active?"#2d3150":"transparent",border:"none",borderRadius:8,
                    color:active?"white":"#6b7280",fontSize:13,cursor:"pointer",textAlign:"left",fontWeight:active?600:400,
                  }}>
                    <span style={{opacity:active?1:0.6}}>{item.icon}</span>
                    <span>{item.label}</span>
                    {item.badge>0&&<span style={{marginLeft:"auto",background:"#ef4444",color:"white",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700}}>{item.badge}</span>}
                  </button>
                );
              })}
            </div>

            <div style={{padding:"12px 12px",borderTop:"1px solid #2a2d3e"}}>
              <select value={currentUser.id}
                onChange={e=>{const u=users.find(u=>u.id===Number(e.target.value));setCU(u);}}
                style={{width:"100%",padding:"7px 8px",border:"1px solid #2a2d3e",borderRadius:7,fontSize:11,color:"white",background:"#2a2d3e",cursor:"pointer"}}>
                {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
              <div style={{marginTop:5,display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:"#10b981"}}/>
                <span style={{fontSize:10,color:"#4a5568"}}>{ROLES[currentUser.role]}</span>
              </div>
            </div>
          </aside>

          <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
            {view==="items" && <ItemsView {...shared}/>}
            {view==="activity" && <ActivityView {...shared}/>}
            {view==="branches" && <BranchesView {...shared}/>}
            {view==="users" && <UsersView {...shared}/>}
          </div>

          {toast&&(
            <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
              background:toast.ok?"#1a1d2e":"#dc2626",color:"white",padding:"10px 20px",
              borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 8px 24px rgba(0,0,0,0.2)",
              zIndex:1000,display:"flex",alignItems:"center",gap:8}}>
              <span>{toast.ok?"✓":"✕"}</span>{toast.msg}
            </div>
          )}
        </div>
      );
    }

    // Рендер
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
