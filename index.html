<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Учёт и Склад</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{
  --f:'Inter',-apple-system,sans-serif;
  --ff:'Fraunces',Georgia,serif;
  --bg:#F7F6F3;--sur:#fff;--brd:#E5E2DA;--brd2:#CCC9C0;
  --tx:#1A1814;--tx2:#58554D;--tx3:#9C998F;
  --ink:#4F4CEC;--ink-h:#3D3AC5;--ink-l:#EEEEFF;--ink-xl:#E0E7FF;
  --gr:#16A34A;--gr-l:#F0FDF4;--gr-m:#15803D;
  --rd:#DC2626;--rd-l:#FEF2F2;--rd-m:#B91C1C;
  --am:#D97706;--am-l:#FFFBEB;--am-m:#B45309;
  --pu:#7C3AED;--pu-l:#F5F3FF;
  --nav:#1A1814;--nav2:#2A2720;--nav3:#3A3730;--navm:#7A776D;
  --sh:0 1px 3px rgba(26,24,20,.06),0 1px 2px rgba(26,24,20,.04);
  --sh2:0 4px 16px rgba(26,24,20,.08);
  --sh3:0 20px 48px rgba(26,24,20,.14);
  --r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;font-size:14px}
body{font-family:var(--f);background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;line-height:1.5}
.ff{font-family:var(--ff)}
button,input,select{font-family:var(--f)}
button{cursor:pointer;border:none;background:none}
input,select{outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.fade-up{animation:fadeUp .2s ease}
.slide-up{animation:slideUp .28s cubic-bezier(.32,.72,0,1)}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);box-shadow:var(--sh);transition:all .2s ease}
.card-hov:hover{transform:translateY(-2px);box-shadow:var(--sh2);border-color:var(--ink)}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback,useRef} = React;

/* ══ SUPABASE ══════════════════════════════════════════════════════════ */
const SB_URL  = "https://ffcbzsdpfgjrmljmxeni.supabase.co";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmY2J6c2RwZmdqcm1sam14ZW5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NzgzNjcsImV4cCI6MjA5MzM1NDM2N30.O7oscWiD3Moza62nTFRIdQhcCvT3SH522yLoQB7Ayyw";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

/* ══ CONSTANTS ════════════════════════════════════════════════════════ */
const TODAY = new Date().toISOString().split("T")[0];
const IN3D  = new Date(Date.now()+3*86400000).toISOString().split("T")[0];
const ROLES = {admin:"Администратор",manager:"Маркетолог",employee:"Сотрудник",director:"Руководитель"};
const TL = {in:"Приход",out:"Выдача",return:"Возврат",writeoff:"Списание"};
const TC = {in:"#16A34A",out:"#4F4CEC",return:"#7C3AED",writeoff:"#DC2626"};
const TB = {in:"#F0FDF4",out:"#EEEEFF",return:"#F5F3FF",writeoff:"#FEF2F2"};
const som = n => `${new Intl.NumberFormat("ru-RU").format(Math.round(n||0))} с`;

/* ══ HOOKS ════════════════════════════════════════════════════════════ */
function useStock(mv){
  return useMemo(()=>{const s={};mv.forEach(m=>{if(!s[m.product_id])s[m.product_id]=0;if(m.type==="in"||m.type==="return")s[m.product_id]+=m.qty;else if(m.type==="out"||m.type==="writeoff")s[m.product_id]-=m.qty});return s},[mv]);
}
function useCheckouts(mv){
  return useMemo(()=>{
    const map={};mv.forEach(m=>{if(m.type==="out")map[m.id]={...m,remaining:m.qty}});
    mv.forEach(m=>{if(m.type==="return"){let l=m.qty;Object.values(map).filter(o=>o.product_id===m.product_id&&o.recipient_id===m.recipient_id&&o.remaining>0).sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(o=>{if(l>0){const t=Math.min(l,o.remaining);o.remaining-=t;l-=t}})}});
    return Object.values(map).filter(o=>o.remaining>0);
  },[mv]);
}
function useToast(){
  const[ts,set]=useState([]);
  const toast=useCallback((msg,type="ok")=>{const id=Date.now()+Math.random();set(p=>[...p,{id,msg,type}]);setTimeout(()=>set(p=>p.filter(t=>t.id!==id)),3000)},[]);
  return{ts,toast};
}

/* ══ PRIMITIVES ═══════════════════════════════════════════════════════ */
const Spin=({s=16})=><span style={{display:"inline-block",width:s,height:s,border:"2px solid currentColor",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>;

function Btn({children,onClick,v="primary",size="md",loading,disabled,icon,style:sx={}}){
  const[h,sh]=useState(false);
  const P={sm:"5px 12px",md:"7px 18px",lg:"11px 24px"}[size];
  const FS={sm:11,md:13,lg:14}[size];
  const V={
    primary:{bg:h&&!disabled?"var(--ink-h)":"var(--ink)",c:"white",b:"var(--ink)"},
    secondary:{bg:h&&!disabled?"var(--bg)":"var(--sur)",c:"var(--tx)",b:"var(--brd2)"},
    ghost:{bg:h&&!disabled?"var(--bg)":"transparent",c:"var(--tx2)",b:"transparent"},
    danger:{bg:h&&!disabled?"var(--rd-m)":"var(--rd)",c:"white",b:"var(--rd)"},
    success:{bg:h&&!disabled?"var(--gr-m)":"var(--gr)",c:"white",b:"var(--gr)"},
    warn:{bg:h&&!disabled?"var(--am-m)":"var(--am)",c:"white",b:"var(--am)"},
  }[v]||{bg:"var(--ink)",c:"white",b:"var(--ink)"};
  return <button onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)} onClick={!disabled&&!loading?onClick:undefined}
    style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,padding:P,fontSize:FS,fontWeight:600,borderRadius:9,border:`1px solid ${V.b}`,background:V.bg,color:V.c,cursor:disabled||loading?"not-allowed":"pointer",opacity:disabled||loading?.55:1,whiteSpace:"nowrap",transition:"all .15s",...sx}}>
    {loading?<Spin s={14}/>:icon&&<span style={{fontSize:14}}>{icon}</span>}{children}
  </button>
}
const Lbl=({c})=><span style={{display:"block",fontSize:11,fontWeight:600,color:"var(--tx2)",marginBottom:5,letterSpacing:".04em",textTransform:"uppercase"}}>{c}</span>;
const Fld=({label,children,full})=><div style={full?{gridColumn:"1/-1"}:{}}><Lbl c={label}/>{children}</div>;
function Inp({value,onChange,placeholder,type="text",style:sx={},onKeyDown,autoFocus,pfx,disabled}){
  const[f,sf]=useState(false);
  return <div style={{position:"relative",display:"flex",alignItems:"center"}}>
    {pfx&&<span style={{position:"absolute",left:10,color:"var(--tx3)",display:"flex",alignItems:"center",pointerEvents:"none"}}>{pfx}</span>}
    <input type={type} value={value} onChange={onChange} placeholder={placeholder} autoFocus={autoFocus} disabled={disabled}
      onFocus={()=>sf(true)} onBlur={()=>sf(false)} onKeyDown={onKeyDown}
      style={{width:"100%",padding:pfx?"8px 12px 8px 32px":"8px 12px",fontSize:13,border:`1px solid ${f?"var(--ink)":"var(--brd)"}`,borderRadius:9,background:disabled?"var(--bg)":"var(--sur)",color:"var(--tx)",boxShadow:f?"0 0 0 3px var(--ink-l)":"none",transition:"all .15s",...sx}}/>
  </div>
}
function Sel({value,onChange,children,style:sx={}}){
  const[f,sf]=useState(false);
  return <select value={value} onChange={onChange} onFocus={()=>sf(true)} onBlur={()=>sf(false)}
    style={{width:"100%",padding:"8px 12px",fontSize:13,border:`1px solid ${f?"var(--ink)":"var(--brd)"}`,borderRadius:9,background:"var(--sur)",color:"var(--tx)",boxShadow:f?"0 0 0 3px var(--ink-l)":"none",transition:"all .15s",...sx}}>
    {children}
  </select>
}
function Badge({children,color="slate",size="sm"}){
  const m={ink:["var(--ink-l)","var(--ink)"],green:["var(--gr-l)","var(--gr-m)"],red:["var(--rd-l)","var(--rd-m)"],amber:["var(--am-l)","var(--am-m)"],purple:["var(--pu-l)","var(--pu)"],slate:["var(--bg)","var(--tx2)"]};
  const[bg,fg]=m[color]||m.slate;
  return <span style={{display:"inline-flex",alignItems:"center",padding:size==="xs"?"1px 6px":"2px 9px",borderRadius:999,fontSize:size==="xs"?10:11,fontWeight:600,background:bg,color:fg,whiteSpace:"nowrap"}}>{children}</span>
}
const TBadge=({type})=>{const m={in:["green","Приход"],out:["ink","Выдача"],return:["purple","Возврат"],writeoff:["red","Списание"]};const[c,l]=m[type]||["slate","?"];return<Badge color={c}>{l}</Badge>};

/* ══ TOASTS ═══════════════════════════════════════════════════════════ */
function Toasts({ts}){return<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",gap:8,alignItems:"center",pointerEvents:"none"}}>
  {ts.map(t=><div key={t.id} className="fade-up" style={{display:"flex",alignItems:"center",gap:10,padding:"10px 20px",borderRadius:12,fontSize:13,fontWeight:500,boxShadow:"var(--sh3)",background:t.type==="error"?"var(--rd)":t.type==="warn"?"var(--am-m)":"var(--nav)",color:"white",whiteSpace:"nowrap"}}>
    {t.type==="error"?"✗":t.type==="warn"?"⚠":"✓"} {t.msg}
  </div>)}
</div>}

/* ══ CONFIRM DIALOG ═══════════════════════════════════════════════════ */
function Confirm({title,message,onOk,onCancel,danger=true}){
  return <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onCancel}>
    <div style={{position:"absolute",inset:0,background:"rgba(26,24,20,.5)",backdropFilter:"blur(4px)"}}/>
    <div className="scale-in" onClick={e=>e.stopPropagation()} style={{position:"relative",background:"var(--sur)",borderRadius:16,width:"100%",maxWidth:380,padding:"24px 28px",boxShadow:"var(--sh3)"}}>
      <div className="ff" style={{fontWeight:700,fontSize:17,marginBottom:8}}>{title}</div>
      <p style={{fontSize:13,color:"var(--tx2)",lineHeight:1.6,marginBottom:20}}>{message}</p>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Btn v="secondary" onClick={onCancel}>Отмена</Btn>
        <Btn v={danger?"danger":"primary"} onClick={onOk}>Подтвердить</Btn>
      </div>
    </div>
  </div>
}

/* ══ BOTTOM SHEET ═════════════════════════════════════════════════════ */
function Sheet({open,onClose,title,children,dirty}){
  const handleClose=()=>{
    if(dirty&&!window.confirm("Есть незаполненные данные. Закрыть без сохранения?"))return;
    onClose();
  };
  if(!open)return null;
  return<div style={{position:"fixed",inset:0,zIndex:900,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={handleClose}>
    <div className="fade-in" style={{position:"absolute",inset:0,background:"rgba(26,24,20,.4)",backdropFilter:"blur(4px)"}}/>
    <div className="slide-up" onClick={e=>e.stopPropagation()} style={{position:"relative",background:"var(--sur)",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:600,maxHeight:"88vh",overflow:"auto",boxShadow:"var(--sh3)",border:"1px solid var(--brd)",borderBottom:"none",zIndex:1}}>
      <div style={{display:"flex",justifyContent:"center",padding:"14px 0 0"}}><div style={{width:44,height:5,borderRadius:3,background:"var(--brd2)"}}/></div>
      {title&&<div className="ff" style={{padding:"12px 26px 0",fontWeight:700,fontSize:20,color:"var(--tx)"}}>{title}</div>}
      <div style={{padding:"14px 26px 32px"}}>{children}</div>
    </div>
  </div>
}

/* ══ VOICE BUTTON ═════════════════════════════════════════════════════ */
function VoiceBtn({onResult,context}){
  const[on,setOn]=useState(false);const[ok,setOk]=useState(true);const ref=useRef(null);
  const hints={in:"Пример: 100 футболок от Поставщика 1",out:"Пример: выдай Айгерим 5 ручек на конференцию",return:"Пример: возврат от Бакыта 3 блокнота"};
  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setOk(false);return}
    const r=new SR();r.lang="ru-RU";r.interimResults=false;r.maxAlternatives=1;
    r.onresult=e=>{onResult(e.results[0][0].transcript);setOn(false)};
    r.onerror=()=>setOn(false);r.onend=()=>setOn(false);ref.current=r;
  },[onResult]);
  if(!ok)return<span style={{fontSize:11,color:"var(--tx3)"}}>Голос доступен только в Chrome</span>;
  return<div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
    <button onClick={()=>{on?ref.current.stop():ref.current.start();setOn(p=>!p)}} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 14px",borderRadius:20,border:`1px solid ${on?"var(--rd)":"var(--brd)"}`,background:on?"var(--rd-l)":"var(--bg)",fontSize:12,fontWeight:600,color:on?"var(--rd)":"var(--tx2)",cursor:"pointer",transition:"all .15s"}}>
      <span style={{animation:on?"blink 1s infinite":"none"}}>{on?"🔴":"🎤"}</span>{on?"Слушаю...":"Голос"}
    </button>
    <span style={{fontSize:11,color:"var(--tx3)"}}>{hints[context]||""}</span>
  </div>
}

/* ══ WIZARD STEPS ═════════════════════════════════════════════════════ */
function WizardSteps({current,total}){
  return<div style={{display:"flex",gap:6,alignItems:"center",marginBottom:20}}>
    {Array.from({length:total}).map((_,i)=><React.Fragment key={i}>
      <div style={{width:26,height:26,borderRadius:"50%",background:i+1===current?"var(--ink)":i+1<current?"var(--gr)":"var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:i+1<=current?"white":"var(--tx3)",transition:"all .2s",flexShrink:0}}>
        {i+1<current?"✓":i+1}
      </div>
      {i<total-1&&<div style={{flex:1,height:2,background:i+1<current?"var(--gr)":"var(--brd)",borderRadius:1,transition:"background .2s"}}/>}
    </React.Fragment>)}
  </div>
}

/* ══ WIZARD OP FORM ═══════════════════════════════════════════════════ */
function OpForm({type,prefill={},onSave,onCancel,S}){
  const{products,recipients,suppliers,directions,branches,profile,toast}=S;
  const t=type;
  const totalSteps=t==="in"?2:3;
  const[step,setStep]=useState(1);
  const[dirty,setDirty]=useState(false);
  const[loading,setL]=useState(false);
  const[confirm,setConfirm]=useState(false);
  const[form,setForm]=useState({
    product_id:prefill.product_id||"",qty:prefill.qty||1,
    recipient_id:prefill.recipient_id||"",branch_id:prefill.branch_id||"",
    purpose:prefill.purpose||"",due_date:"",sz:prefill.sz||"",
    supplier_id:suppliers[0]?.id||"",direction_id:"",condition:"хорошее",notes:""
  });
  const upd=(key,val)=>{setForm(f=>({...f,[key]:val}));setDirty(true)};
  const selProd=useMemo(()=>products.find(p=>p.id==form.product_id),[form.product_id,products]);
  const selRec=useMemo(()=>recipients.find(r=>r.id==form.recipient_id),[form.recipient_id,recipients]);
  useEffect(()=>{if(selProd&&t==="in")setForm(f=>({...f,supplier_id:selProd.supplier_id||f.supplier_id,direction_id:selProd.direction_id||f.direction_id}))},[selProd,t]);
  useEffect(()=>{if(selRec)setForm(f=>({...f,branch_id:selRec.branch_id||f.branch_id}))},[selRec]);

  const handleVoice=useCallback(text=>{
    const low=text.toLowerCase();
    const prod=products.find(p=>(p.name||"").toLowerCase().split(" ").some(w=>w.length>3&&low.includes(w)));
    const rec=recipients.find(r=>(r.name||"").toLowerCase().split(" ").some(w=>w.length>2&&low.includes(w)));
    const bra=branches.find(b=>(b.name||"").toLowerCase().split(" ").some(w=>w.length>2&&low.includes(w)));
    const qm=low.match(/(\d+)/);
    setForm(f=>({...f,...(prod?{product_id:prod.id}:{}),...(rec?{recipient_id:rec.id}:{}),...(bra?{branch_id:bra.id}:{}),...(qm?{qty:parseInt(qm[0])}:{})}));
    setDirty(true);
  },[products,recipients,branches]);

  const doSave=async()=>{
    if(!form.product_id){toast("Выберите товар","error");return}
    setL(true);
    const{error}=await sb.from("movements").insert({
      type:t,product_id:Number(form.product_id),qty:Number(form.qty),
      location_id:selProd?.location_id||null,issuer_id:profile.id,
      recipient_id:Number(form.recipient_id)||null,
      branch_id:Number(form.branch_id)||selRec?.branch_id||null,
      supplier_id:t==="in"?Number(form.supplier_id)||null:null,
      purpose:t==="out"?form.purpose||null:null,
      due_date:t==="out"?form.due_date||null:null,
      sz:t==="out"?form.sz||null:null,
      direction_id:form.direction_id?Number(form.direction_id):null,
      condition:t==="return"?form.condition:null,
      notes:form.notes||null,date:TODAY
    });
    setL(false);
    if(error){toast("Ошибка: "+error.message,"error");return}
    onSave();
  };

  const needsConfirm=t==="writeoff"||(t==="return"&&step===totalSteps);
  const handleNext=()=>step<totalSteps?setStep(s=>s+1):needsConfirm?setConfirm(true):doSave();
  const ico={in:"📥",out:"📤",return:"🔄",writeoff:"🗑️"};

  return<div>
    {confirm&&<Confirm title={`Подтвердить ${TL[t]}?`} message={`${TL[t]} ${form.qty} шт. товара "${selProd?.name||"—"}"${selRec?` от ${selRec.name}`:""}`} onOk={()=>{setConfirm(false);doSave()}} onCancel={()=>setConfirm(false)}/>}
    <WizardSteps current={step} total={totalSteps}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:24}}>{ico[t]}</span>
        <span className="ff" style={{fontWeight:700,fontSize:18,color:TC[t]}}>{TL[t]}</span>
        {step>1&&<span style={{fontSize:12,color:"var(--tx3)"}}>Шаг {step} из {totalSteps}</span>}
      </div>
      <VoiceBtn onResult={handleVoice} context={t}/>
    </div>

    {step===1&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Fld label="Товар"><Sel value={form.product_id} onChange={e=>upd("product_id",e.target.value)}>
        <option value="">— выбрать товар —</option>
        {products.filter(p=>!p.archived).map(p=><option key={p.id} value={p.id}>{p.name}{p.sku?` (${p.sku})`:""}</option>)}
      </Sel></Fld>
      {selProd&&<div style={{display:"flex",gap:10,padding:"10px 14px",background:"var(--ink-l)",borderRadius:9,fontSize:12,color:"var(--ink)",alignItems:"center"}}>
        <span className="ff" style={{fontWeight:700,fontSize:16}}>{S.stock[selProd.id]||0} шт</span>
        <span>на складе · {som(selProd.price)} за шт.</span>
      </div>}
      <Fld label="Количество"><Inp type="number" value={form.qty} onChange={e=>upd("qty",e.target.value)}/></Fld>
      {t==="in"&&suppliers.length>0&&<Fld label="Поставщик"><Sel value={form.supplier_id} onChange={e=>upd("supplier_id",e.target.value)}>
        {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
      </Sel></Fld>}
      <div style={{display:"flex",gap:8,marginTop:4}}>
        {onCancel&&<Btn v="secondary" onClick={onCancel}>Отмена</Btn>}
        <Btn onClick={handleNext} style={{flex:1}} disabled={!form.product_id}>{t==="in"&&totalSteps===2?"Далее →":"Далее →"}</Btn>
      </div>
    </div>}

    {step===2&&(t==="out"||t==="return")&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Fld label={t==="out"?"Получатель":"Возврат от"}><Sel value={form.recipient_id} onChange={e=>upd("recipient_id",e.target.value)}>
        <option value="">— выбрать —</option>
        {recipients.map(r=><option key={r.id} value={r.id}>{r.name} ({branches.find(b=>b.id===r.branch_id)?.name||"—"})</option>)}
      </Sel></Fld>
      <Fld label="Или выбрать филиал напрямую"><Sel value={form.branch_id} onChange={e=>upd("branch_id",e.target.value)}>
        <option value="">— выбрать —</option>
        {branches.map(b=><option key={b.id} value={b.id}>{b.name} ({b.city})</option>)}
      </Sel></Fld>
      {t==="return"&&<Fld label="Состояние товара"><Sel value={form.condition} onChange={e=>upd("condition",e.target.value)}>
        <option value="хорошее">✅ Хорошее</option><option value="б/у">⚠ Б/у</option><option value="брак">❌ Брак</option>
      </Sel></Fld>}
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <Btn v="secondary" onClick={()=>setStep(1)}>← Назад</Btn>
        <Btn onClick={handleNext} style={{flex:1}}>Далее →</Btn>
      </div>
    </div>}

    {step===2&&t==="in"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      {directions.length>0&&<Fld label="Направление"><Sel value={form.direction_id} onChange={e=>upd("direction_id",e.target.value)}>
        <option value="">— не выбрано —</option>
        {directions.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
      </Sel></Fld>}
      <Fld label="Примечание (необяз.)"><Inp value={form.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Комментарий"/></Fld>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <Btn v="secondary" onClick={()=>setStep(1)}>← Назад</Btn>
        <Btn onClick={doSave} loading={loading} style={{flex:1}}>Сохранить</Btn>
      </div>
    </div>}

    {step===3&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      {t==="out"&&<>
        <Fld label="Цель / мероприятие"><Inp value={form.purpose} onChange={e=>upd("purpose",e.target.value)} placeholder="Конференция, выставка..."/></Fld>
        <Fld label="Вернуть до"><Inp type="date" value={form.due_date} onChange={e=>upd("due_date",e.target.value)}/></Fld>
        <Fld label="Номер СЗ"><Inp value={form.sz} onChange={e=>upd("sz",e.target.value)} placeholder="СЗ-001"/></Fld>
        {directions.length>0&&<Fld label="Направление"><Sel value={form.direction_id} onChange={e=>upd("direction_id",e.target.value)}>
          <option value="">— не выбрано —</option>
          {directions.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
        </Sel></Fld>}
      </>}
      <Fld label="Примечание (необяз.)"><Inp value={form.notes} onChange={e=>upd("notes",e.target.value)}/></Fld>
      {/* Итог перед сохранением */}
      <div style={{padding:"12px 14px",background:"var(--bg)",borderRadius:10,border:"1px solid var(--brd)",fontSize:12}}>
        <div className="ff" style={{fontWeight:600,marginBottom:6,fontSize:13}}>Итог операции</div>
        <div style={{display:"flex",flexDirection:"column",gap:3,color:"var(--tx2)"}}>
          <div>Товар: <b style={{color:"var(--tx)"}}>{selProd?.name||"—"}</b> × {form.qty} шт</div>
          {selRec&&<div>Получатель: <b style={{color:"var(--tx)"}}>{selRec.name}</b></div>}
          {form.purpose&&<div>Цель: {form.purpose}</div>}
          {form.due_date&&<div>Вернуть до: {form.due_date}</div>}
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <Btn v="secondary" onClick={()=>setStep(2)}>← Назад</Btn>
        <Btn onClick={handleNext} loading={loading} style={{flex:1}}>Сохранить операцию</Btn>
      </div>
    </div>}
  </div>
}

/* ══ RT INDICATOR ═════════════════════════════════════════════════════ */

        <div>
          <div className="ff" style={{fontWeight:700,fontSize:15,color:"white"}}>Учёт и Склад</div>

          onMouseEnter={e=>{if(!act){e.currentTarget.style.background="var(--nav2)";e.currentTarget.style.color="white"}}}

          <span style={{flex:1}}>{n.l}</span>

          <div style={{fontSize:10,color:"var(--navm)"}}>{ROLES[profile.role]||profile.role}</div>

/* ══ HOME / MENU ══════════════════════════════════════════════════════ */
function Home({S,stock,checkouts,setView}){
  const{products,movements,branches,recipients,profile,toast}=S;
  const[sheet,setSheet]=useState(null);
  const active=products.filter(p=>!p.archived);
  const totalQty=active.reduce((a,p)=>a+(stock[p.id]||0),0);
  const totalVal=active.reduce((a,p)=>a+(stock[p.id]||0)*p.price,0);
  const overdue=checkouts.filter(c=>c.due_date&&c.due_date<TODAY);
  const soon=checkouts.filter(c=>c.due_date&&c.due_date>TODAY&&c.due_date<=IN3D);
  const lastOut=useMemo(()=>[...movements].filter(m=>m.type==="out"&&m.issuer_id===profile?.id).sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""))[0],[movements,profile]);
  const recent=[...movements].sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||"")).slice(0,6);
  const lowStock=active.filter(p=>(stock[p.id]||0)<5);
  const byBranch=branches.map(b=>{const os=checkouts.filter(c=>c.branch_id===b.id);return{...b,qty:os.reduce((a,c)=>a+c.remaining,0),val:os.reduce((a,c)=>a+(active.find(p=>p.id===c.product_id)?.price||0)*c.remaining,0)}});
  const morning=new Date().getHours()<12?"Доброе утро":new Date().getHours()<18?"Добрый день":"Добрый вечер";
  const pName=id=>products.find(p=>p.id===id)?.name??"—";
  const rName=id=>recipients.find(r=>r.id===id)?.name??"—";

  const ActionCard=({ico,title,sub,type,prefill={},accent,tag})=>{
    const[h,sh]=useState(false);
    return<button onClick={()=>setSheet({type,prefill})} onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)}
      style={{textAlign:"left",padding:"22px",background:h?accent+"12":"var(--sur)",border:`1px solid ${h?accent:"var(--brd)"}`,borderRadius:16,cursor:"pointer",transition:"all .18s",boxShadow:h?"var(--sh2)":"var(--sh)",width:"100%",position:"relative"}}>
      {tag&&<div style={{position:"absolute",top:12,right:12,background:accent,color:"white",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700}}>{tag}</div>}
      <div style={{fontSize:30,marginBottom:12}}>{ico}</div>
      <div className="ff" style={{fontWeight:700,fontSize:16,color:"var(--tx)",marginBottom:4}}>{title}</div>
      <div style={{fontSize:12,color:"var(--tx3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub}</div>
    </button>
  };

  return<div style={{height:"100%",overflow:"auto",background:"var(--bg)"}}>
    <div style={{padding:"28px 28px 24px",background:"var(--sur)",borderBottom:"1px solid var(--brd)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
        <div>
          <h1 className="ff" style={{fontSize:28,fontWeight:700,color:"var(--tx)",letterSpacing:"-.02em"}}>{morning}, {profile?.name||profile?.email?.split("@")[0]} 👋</h1>
          <p style={{fontSize:13,color:"var(--tx3)",marginTop:4}}>{ROLES[profile?.role]} · {new Date().toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"})}</p>
        </div>
        <Btn v="secondary" onClick={()=>setView("items")}>Все товары →</Btn>
      </div>
      {can("move")&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
        <ActionCard ico="📥" type="in"     accent="var(--gr)"  title="Принять товар"  sub="Новая поставка от поставщика"/>
        <ActionCard ico="📤" type="out"    accent="var(--ink)" title={lastOut?"Повторить выдачу":"Выдать товар"}
          sub={lastOut?`→ ${rName(lastOut.recipient_id)} · ${pName(lastOut.product_id)}`:"На мероприятие или акцию"}
          prefill={lastOut?{product_id:lastOut.product_id,qty:lastOut.qty,recipient_id:lastOut.recipient_id,purpose:lastOut.purpose,sz:lastOut.sz}:{}}
          tag={lastOut?"⟳ Повторить":null}/>
        <ActionCard ico="🔄" type="return" accent="var(--pu)"  title="Принять возврат" sub="Сотрудник вернул товар"/>
      </div>}
      {!can("move")&&<div style={{padding:"16px 18px",background:"var(--bg)",borderRadius:12,border:"1px solid var(--brd)",fontSize:13,color:"var(--tx3)",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>👁</span>
        <span>Режим просмотра. Операции доступны маркетологам и администраторам.</span>
      </div>}
    </div>

    <div style={{padding:24}}>
      {overdue.length>0&&<div className="fade-up" style={{background:"var(--sur)",border:"1px solid #FECACA",borderLeft:"4px solid var(--rd)",borderRadius:14,padding:"14px 18px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <span className="ff" style={{fontWeight:700,fontSize:15,color:"var(--rd)"}}>⚠ Просрочено {overdue.length} выдач</span>
          <Btn v="ghost" size="sm" onClick={()=>setView("branches")}>Подробнее →</Btn>
        </div>
        {overdue.slice(0,3).map((c,i)=>{const days=Math.floor((new Date()-new Date(c.due_date))/86400000);return<div key={i} style={{fontSize:12,color:"var(--tx2)",display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
          <span style={{fontWeight:600}}>{rName(c.recipient_id)}</span><span>—</span><span>{pName(c.product_id)}</span><span>× {c.remaining} шт</span><Badge color="red">+{days}д</Badge>
        </div>})}
      </div>}

      {soon.length>0&&<div style={{background:"var(--sur)",border:"1px solid #FDE68A",borderLeft:"4px solid var(--am)",borderRadius:14,padding:"12px 18px",marginBottom:12}}>
        <span className="ff" style={{fontWeight:600,fontSize:13,color:"var(--am)"}}>⏳ Истекают в ближайшие 3 дня: {soon.length} выдач</span>
        <div style={{marginTop:6,display:"flex",gap:8,flexWrap:"wrap"}}>
          {soon.map((c,i)=><Badge key={i} color="amber">{rName(c.recipient_id)} · {pName(c.product_id)} до {c.due_date}</Badge>)}
        </div>
      </div>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[{v:active.length,l:"Позиций товаров",c:"var(--ink)"},{v:`${totalQty} шт`,l:"Единиц на складе",c:"var(--gr)"},{v:som(totalVal),l:"Стоимость склада",c:"var(--pu)"},{v:overdue.length,l:"Просрочено выдач",c:overdue.length?"var(--rd)":"var(--gr)"}].map((k,i)=>
          <div key={i} className="card" style={{padding:"16px 18px",borderTop:`3px solid ${k.c}`}}>
            <div className="ff" style={{fontSize:24,fontWeight:800,color:k.c,letterSpacing:"-.02em"}}>{k.v}</div>
            <div style={{fontSize:11,color:"var(--tx3)",marginTop:4}}>{k.l}</div>
          </div>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1.5fr 1fr",gap:16}}>
        <div className="card" style={{padding:0,overflow:"hidden"}}>
          <div className="ff" style={{padding:"14px 18px",borderBottom:"1px solid var(--brd)",fontWeight:600,fontSize:15}}>Последние операции</div>
          {recent.length===0?<div style={{padding:24,textAlign:"center",color:"var(--tx3)"}}>Нет операций</div>:
          recent.map((m,i)=><div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 18px",borderBottom:i<recent.length-1?"1px solid var(--brd)":"none"}}>
            <TBadge type={m.type}/>
            <span style={{fontWeight:500,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13}}>{pName(m.product_id)}</span>
            <span className="ff" style={{fontWeight:700,color:"var(--tx2)"}}>×{m.qty}</span>
            <span style={{fontSize:11,color:"var(--tx3)"}}>{m.recipient_id?rName(m.recipient_id):"—"}</span>
            <span style={{fontSize:10,color:"var(--tx3)",fontFamily:"monospace"}}>{(m.created_at||"").slice(0,10)}</span>
          </div>)}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {lowStock.length>0&&<div className="card" style={{padding:0,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span className="ff" style={{fontWeight:600,fontSize:14,color:"var(--am)"}}>📉 Заканчивается</span>
              <Badge color="amber">{lowStock.length}</Badge>
            </div>
            {lowStock.slice(0,4).map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 16px",borderBottom:"1px solid var(--brd)",fontSize:13}}>
              <span style={{fontWeight:500}}>{p.name}</span>
              <Badge color={(stock[p.id]||0)===0?"red":"amber"}>{stock[p.id]||0} шт</Badge>
            </div>)}
          </div>}

          <div className="card" style={{padding:0,overflow:"hidden"}}>
            <div className="ff" style={{padding:"12px 16px",borderBottom:"1px solid var(--brd)",fontWeight:600,fontSize:14}}>По филиалам</div>
            {byBranch.map((b,i)=><div key={b.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:i<byBranch.length-1?"1px solid var(--brd)":"none"}}>
              <div><div style={{fontWeight:500,fontSize:13}}>{b.name}</div><div style={{fontSize:10,color:"var(--tx3)"}}>{b.city}</div></div>
              <div style={{textAlign:"right"}}>
                <div className="ff" style={{fontWeight:700,fontSize:16,color:b.qty>0?"var(--ink)":"var(--tx3)"}}>{b.qty}</div>
                <div style={{fontSize:10,color:"var(--tx3)"}}>{som(b.val)}</div>
              </div>
            </div>)}
          </div>
        </div>
      </div>
    </div>

    <Sheet open={!!sheet} onClose={()=>setSheet(null)} title={sheet?TL[sheet.type]:""} dirty={false}>
      {sheet&&<OpForm type={sheet.type} prefill={sheet.prefill} onSave={()=>{setSheet(null);toast(`${TL[sheet.type]} сохранена`)}} onCancel={()=>setSheet(null)} S={{...S,stock}}/>}
    </Sheet>
  </div>
}

/* ══ ITEMS VIEW ═══════════════════════════════════════════════════════ */
function ItemsView({S,stock,checkouts}){
  const{products,setProducts,categories,suppliers,directions,locations,productTypes,recipients,can,toast,profile}=S;
  const[search,setSrch]=useState("");const[catF,setCatF]=useState("all");const[mode,setMode]=useState("grid");
  const[showAdd,setAdd]=useState(false);const[sel,setSel]=useState(null);const[loading,setL]=useState(false);
  const {isRestricted,userBranchId}=S;
  const visible=products.filter(p=>!p.archived&&(!isRestricted||locations.find(l=>l.id===p.location_id)?.branch_id===userBranchId));
  const filtered=visible.filter(p=>(catF==="all"||p.category_id===catF)&&(!search||p.name?.toLowerCase().includes(search.toLowerCase())||(p.sku||"").toLowerCase().includes(search.toLowerCase())));
  const[form,setForm]=useState({name:"",sku:"",category_id:"",price:"",location_id:locations[0]?.id||"",supplier_id:suppliers[0]?.id||"",product_type_id:"",direction_id:""});
  const saveProduct=async()=>{if(!form.name.trim()){toast("Укажите название","error");return}setL(true);const{error}=await sb.from("products").insert({name:form.name,sku:form.sku||null,category_id:form.category_id?Number(form.category_id)||form.category_id:null,price:Number(form.price)||0,location_id:form.location_id?Number(form.location_id):null,supplier_id:form.supplier_id?Number(form.supplier_id):null,product_type_id:form.product_type_id?Number(form.product_type_id)||form.product_type_id:null,direction_id:form.direction_id?Number(form.direction_id):null,archived:false});if(error){toast("Ошибка: "+error.message,"error")}else{setAdd(false);toast("Товар добавлен")}setL(false)};
  const totalVal=visible.reduce((a,p)=>a+(stock[p.id]||0)*p.price,0);

  return<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{background:"var(--sur)",borderBottom:"1px solid var(--brd)",padding:"14px 22px",flexShrink:0}}>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
        <Inp value={search} onChange={e=>setSrch(e.target.value)} placeholder="Поиск по названию или артикулу…" pfx="🔍" style={{flex:1}}/>
        <div style={{display:"flex",border:"1px solid var(--brd)",borderRadius:9,overflow:"hidden"}}>
          {[["grid","⊞"],["list","≡"]].map(([m,ic])=><button key={m} onClick={()=>setMode(m)} style={{padding:"7px 10px",background:mode===m?"var(--nav)":"var(--sur)",color:mode===m?"white":"var(--tx2)",fontSize:15,transition:"all .12s"}}>{ic}</button>)}
        </div>
        {can("edit")&&<Btn onClick={()=>setAdd(!showAdd)} icon="➕">Добавить</Btn>}
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        <button onClick={()=>setCatF("all")} style={{padding:"4px 12px",borderRadius:999,border:`1px solid ${catF==="all"?"var(--ink)":"var(--brd)"}`,fontSize:12,fontWeight:catF==="all"?600:400,background:catF==="all"?"var(--ink-l)":"var(--sur)",color:catF==="all"?"var(--ink)":"var(--tx2)",cursor:"pointer",transition:"all .12s"}}>Все ({visible.length})</button>

          <span className="ff" style={{fontWeight:700,fontSize:16}}>Новый товар</span><Btn v="ghost" size="sm" onClick={()=>setAdd(false)}>✕</Btn>
        </div>
        <div style={{padding:20}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:12,marginBottom:14}}>

            <Fld label="Категория"><Sel value={form.category_id} onChange={e=>setForm({...form,category_id:e.target.value})}><option value="">—</option>{categories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}</Sel></Fld>
            <Fld label="Тип продукта"><Sel value={form.product_type_id} onChange={e=>setForm({...form,product_type_id:e.target.value})}><option value="">—</option>{productTypes.map(pt=><option key={pt.id} value={pt.id}>{pt.name}</option>)}</Sel></Fld>
            <Fld label="Цена (сом)"><Inp type="number" value={form.price} onChange={e=>setForm({...form,price:e.target.value})}/></Fld>
            <Fld label="Место хранения"><Sel value={form.location_id} onChange={e=>setForm({...form,location_id:e.target.value})}><option value="">—</option>{locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Sel></Fld>
            <Fld label="Поставщик"><Sel value={form.supplier_id} onChange={e=>setForm({...form,supplier_id:e.target.value})}><option value="">—</option>{suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Sel></Fld>
            <Fld label="Направление"><Sel value={form.direction_id} onChange={e=>setForm({...form,direction_id:e.target.value})}><option value="">—</option>{directions.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</Sel></Fld>
          </div>
          <div style={{display:"flex",gap:8}}><Btn onClick={saveProduct} loading={loading}>Сохранить товар</Btn><Btn v="secondary" onClick={()=>setAdd(false)}>Отмена</Btn></div>
        </div>
      </div>}

      {filtered.length===0&&!showAdd&&<div style={{textAlign:"center",padding:"60px 20px",color:"var(--tx3)"}}>
        <div className="ff" style={{fontSize:44,marginBottom:12}}>📦</div>
        <div className="ff" style={{fontSize:18,fontWeight:600,color:"var(--tx2)",marginBottom:4}}>{search?"Ничего не найдено":"Нет товаров"}</div>
        {!search&&can("edit")&&<Btn onClick={()=>setAdd(true)} style={{marginTop:12}}>+ Добавить первый товар</Btn>}
      </div>}

      {mode==="grid"
        ?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(196px,1fr))",gap:14}}>
          {filtered.map(p=>{const qty=stock[p.id]||0;const cat=categories.find(c=>c.id===p.category_id||c.name===p.category_id)||{icon:"📦",color:"#6366F1"};const onH=checkouts.filter(c=>c.product_id===p.id).reduce((a,c)=>a+c.remaining,0);const[h,sh]=useState(false);
            return<div key={p.id} onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)} onClick={()=>setSel(p)} style={{background:"var(--sur)",borderRadius:16,border:`1px solid ${h?(cat.color||"var(--ink)")+"80":"var(--brd)"}`,overflow:"hidden",transition:"all .18s",boxShadow:h?"var(--sh2)":"var(--sh)",cursor:"pointer"}}>
              <div style={{height:96,background:`linear-gradient(135deg,${cat.color||"#6366F1"}18,${cat.color||"#6366F1"}30)`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                <span style={{fontSize:36}}>{cat.icon||"📦"}</span>
                <div style={{position:"absolute",top:8,right:8,background:"var(--sur)",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700,color:qty===0?"var(--rd)":qty<5?"var(--am)":"var(--gr)",boxShadow:"var(--sh)"}}>{qty} шт</div>
                {onH>0&&<div style={{position:"absolute",top:8,left:8,background:"var(--ink-l)",borderRadius:20,padding:"2px 7px",fontSize:10,fontWeight:600,color:"var(--ink)"}}>↑{onH}</div>}
              </div>
              <div style={{padding:"12px 14px"}}>
                <div className="ff" style={{fontWeight:700,fontSize:13,color:"var(--tx)",marginBottom:2,lineHeight:1.3,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",minHeight:34}}>{p.name}</div>
                <div style={{fontSize:11,color:"var(--tx3)"}}>{som(p.price)} · {som(qty*p.price)} всего</div>
              </div>
            </div>})}
        </div>
        :<div className="card" style={{padding:0,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"var(--bg)"}}>{["","Название","Артикул","Категория","Цена","Остаток","Стоимость"].map(h=><th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:10,fontWeight:600,color:"var(--tx3)",letterSpacing:".06em",textTransform:"uppercase",borderBottom:"1px solid var(--brd)",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>{filtered.map((p,i)=>{const qty=stock[p.id]||0;const cat=categories.find(c=>c.id===p.category_id||c.name===p.category_id)||{icon:"📦",color:"#6366F1"};
              return<tr key={p.id} onClick={()=>setSel(p)} style={{background:i%2?"var(--bg)":"var(--sur)",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="var(--ink-l)"} onMouseLeave={e=>e.currentTarget.style.background=i%2?"var(--bg)":"var(--sur)"}>
                <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)"}}><div style={{width:34,height:34,borderRadius:9,background:(cat.color||"#6366F1")+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{cat.icon||"📦"}</div></td>
                <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",fontWeight:600}}>{p.name}</td>
                <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",fontFamily:"monospace",fontSize:11,color:"var(--tx3)"}}>{p.sku||"—"}</td>
                <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)"}}><span style={{background:(cat.color||"#6366F1")+"18",color:cat.color||"#6366F1",padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:600}}>{cat.name||"—"}</span></td>
                <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",color:"var(--tx2)"}}>{som(p.price)}</td>
                <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)"}}><span className="ff" style={{fontWeight:700,fontSize:16,color:qty===0?"var(--rd)":qty<5?"var(--am)":"var(--tx)"}}>{qty}</span></td>
                <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",fontWeight:500}}>{som(qty*p.price)}</td>
              </tr>})}
            </tbody>
          </table>
        </div>}
    </div>
    {sel&&<ItemModal p={sel} stock={stock} S={S} checkouts={checkouts} onClose={()=>setSel(null)}/>}
  </div>
}

function ItemModal({p,stock,S,checkouts,onClose}){
  const qty=stock[p.id]||0;const onH=checkouts.filter(c=>c.product_id===p.id);const hist=S.movements.filter(m=>m.product_id===p.id).sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""));
  const[rqty,setRqty]=useState(1);const[tab,setTab]=useState("info");
  const cat=S.categories.find(c=>c.id===p.category_id||c.name===p.category_id)||{icon:"📦",color:"#6366F1"};
  const[confirm,setConfirm]=useState(null);
  const rName=id=>S.recipients.find(r=>r.id===id)?.name??"—";
  const doAction=async(type,qty_,extra={})=>{
    const{error}=await sb.from("movements").insert({type,product_id:p.id,qty:qty_,location_id:p.location_id,issuer_id:S.profile.id,date:TODAY,...extra});
    if(error)S.toast("Ошибка","error");else S.toast(`${TL[type]} сохранена`);
    setConfirm(null);
  };
  return<div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
    {confirm&&<Confirm title={confirm.title} message={confirm.message} onOk={confirm.onOk} onCancel={()=>setConfirm(null)}/>}
    <div style={{position:"absolute",inset:0,background:"rgba(26,24,20,.5)",backdropFilter:"blur(5px)"}}/>
    <div className="scale-in" onClick={e=>e.stopPropagation()} style={{position:"relative",background:"var(--sur)",borderRadius:20,width:"100%",maxWidth:640,maxHeight:"90vh",overflow:"auto",boxShadow:"var(--sh3)",border:"1px solid var(--brd)"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",padding:"20px 24px 16px",borderBottom:"1px solid var(--brd)"}}>
        <div>
          <div className="ff" style={{fontWeight:700,fontSize:18}}>{p.name}</div>
          <div style={{fontSize:12,color:"var(--tx3)",marginTop:3}}>{cat.icon} {cat.name||"—"} · {p.sku||"—"}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span className="ff" style={{fontSize:30,fontWeight:800,color:qty===0?"var(--rd)":qty<5?"var(--am)":"var(--gr)",letterSpacing:"-.03em"}}>{qty}<span style={{fontSize:14,color:"var(--tx3)"}}> шт</span></span>
          <button onClick={onClose} style={{padding:6,borderRadius:8,color:"var(--tx3)",cursor:"pointer",fontSize:18,lineHeight:1}} onMouseEnter={e=>e.target.style.background="var(--bg)"} onMouseLeave={e=>e.target.style.background="transparent"}>✕</button>
        </div>
      </div>
      <div style={{padding:"16px 24px"}}>
        <div style={{display:"flex",gap:3,padding:3,background:"var(--bg)",borderRadius:10,width:"fit-content",marginBottom:16}}>
          {[["info","Информация"],["history",`История (${hist.length})`]].map(([t,l])=><button key={t} onClick={()=>setTab(t)} style={{padding:"6px 16px",borderRadius:8,border:"none",fontSize:12,fontWeight:tab===t?600:400,cursor:"pointer",background:tab===t?"var(--sur)":"transparent",color:tab===t?"var(--tx)":"var(--tx2)",boxShadow:tab===t?"var(--sh)":"none",transition:"all .12s"}}>{l}</button>)}
        </div>

        {tab==="info"&&<>
          {onH.length>0&&<div style={{background:"var(--ink-l)",borderRadius:12,padding:"12px 16px",marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--ink)",letterSpacing:".05em",textTransform:"uppercase",marginBottom:10}}>На руках — {onH.reduce((a,c)=>a+c.remaining,0)} шт</div>
            {onH.map((c,i)=>{const isOD=c.due_date&&c.due_date<TODAY;const days=c.due_date?Math.floor((new Date()-new Date(c.due_date))/86400000):null;
              return<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<onH.length-1?"1px solid #D4D2F5":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"var(--ink)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:12}}>{rName(c.recipient_id)[0]}</div>
                  <div><div className="ff" style={{fontSize:13,fontWeight:600}}>{rName(c.recipient_id)}</div>{c.sz&&<div style={{fontSize:10,color:"var(--tx3)"}}>СЗ: {c.sz}</div>}</div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span className="ff" style={{fontWeight:700,color:"var(--ink)"}}>{c.remaining} шт</span>
                  {isOD?<Badge color="red">+{days}д</Badge>:c.due_date?<Badge color="green">до {c.due_date}</Badge>:null}
                  {S.can("move")&&<Btn v="success" size="sm" onClick={()=>setConfirm({title:"Оформить возврат?",message:`Возврат ${c.remaining} шт от ${rName(c.recipient_id)}`,onOk:()=>doAction("return",c.remaining,{recipient_id:c.recipient_id,branch_id:c.branch_id,condition:"хорошее"})})}>Вернуть</Btn>}
                </div>
              </div>})}
          </div>}

          {S.can("move")&&<div style={{display:"flex",gap:8,alignItems:"center",padding:"14px 0",borderTop:"1px solid var(--brd)"}}>
            <Btn v="success" onClick={()=>doAction("in",rqty,{supplier_id:p.supplier_id,notes:"Приход"})}>+ Приход</Btn>
            <div style={{display:"flex",alignItems:"center",border:"1px solid var(--brd)",borderRadius:9,overflow:"hidden"}}>
              <button onClick={()=>setRqty(Math.max(1,rqty-1))} style={{padding:"7px 11px",background:"var(--bg)",fontSize:16,color:"var(--tx2)",cursor:"pointer"}}>−</button>
              <span className="ff" style={{padding:"7px 14px",fontSize:15,fontWeight:700,minWidth:40,textAlign:"center"}}>{rqty}</span>
              <button onClick={()=>setRqty(rqty+1)} style={{padding:"7px 11px",background:"var(--bg)",fontSize:16,color:"var(--tx2)",cursor:"pointer"}}>+</button>
            </div>
            <Btn v="danger" onClick={()=>setConfirm({title:"Подтвердить списание?",message:`Списать ${rqty} шт товара "${p.name}"`,onOk:()=>doAction("writeoff",rqty,{notes:"Списание"})})}>Списать</Btn>
            <div style={{marginLeft:"auto"}}><Badge color="slate">Стоимость: {som(qty*p.price)}</Badge></div>
          </div>}
        </>}

        {tab==="history"&&<div style={{maxHeight:300,overflow:"auto"}}>
          {hist.length===0?<div style={{padding:32,textAlign:"center",color:"var(--tx3)"}}>Нет операций</div>:
          hist.map((m,i)=><div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid var(--brd)"}}>
            <TBadge type={m.type}/><span className="ff" style={{fontWeight:600}}>×{m.qty}</span>
            {m.recipient_id&&<span style={{fontSize:12,color:"var(--tx2)"}}>{rName(m.recipient_id)}</span>}
            {m.sz&&<Badge color="ink" size="xs">{m.sz}</Badge>}
            <span style={{marginLeft:"auto",fontSize:11,color:"var(--tx3)",fontFamily:"monospace"}}>{(m.created_at||"").slice(0,10)}</span>
          </div>)}
        </div>}
      </div>
    </div>
  </div>
}

/* ══ ACTIVITY VIEW ════════════════════════════════════════════════════ */
function ActivityView({S,checkouts,overdue}){
  const {movements,products,recipients,suppliers,branches,can,toast,profile,isRestricted,userBranchId}=S;
  const[typeF,setTypeF]=useState("all");const[brF,setBrF]=useState("");const[search,setSrch]=useState("");const[sheet,setSheet]=useState(null);
  const[dateFrom,setDF]=useState("");const[dateTo,setDT]=useState(TODAY);
  const pName=id=>products.find(p=>p.id===id)?.name??"—";
  const rName=id=>recipients.find(r=>r.id===id)?.name??"—";
  const brName=id=>branches.find(b=>b.id===id)?.name??"—";
  const filtered=[...movements].filter(m=>{
    if(typeF!=="all"&&m.type!==typeF)return false;
    if(isRestricted&&m.branch_id!==userBranchId&&m.issuer_id!==profile?.id)return false;
    if(brF&&m.branch_id!=brF)return false;
    const d=(m.date||m.created_at||"").slice(0,10);
    if(dateFrom&&d<dateFrom)return false;
    if(d>dateTo)return false;
    if(search){const str=(pName(m.product_id)+(m.recipient_id?rName(m.recipient_id):"")+(m.purpose||"")+(m.sz||"")).toLowerCase();if(!str.includes(search.toLowerCase()))return false}
    return true;
  }).sort((a,b)=>(b.created_at||b.date||"").localeCompare(a.created_at||a.date||""));

  return<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{background:"var(--sur)",borderBottom:"1px solid var(--brd)",padding:"14px 22px",flexShrink:0}}>
      {overdue.length>0&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",background:"var(--rd-l)",border:"1px solid #FECACA",borderRadius:10,marginBottom:12,fontSize:12,color:"var(--rd)",fontWeight:600}}>
        ⚠ {overdue.length} выдач просрочено
      </div>}
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
        <span className="ff" style={{fontSize:17,fontWeight:700}}>Движения товаров</span>
        {can("move")&&<div style={{marginLeft:"auto",display:"flex",gap:6}}>
          {[{t:"out",l:"📤 Выдать"},{t:"return",l:"🔄 Возврат"},{t:"writeoff",l:"🗑 Списать"},{t:"in",l:"📥 Приход"}].map(op=><Btn key={op.t} size="sm" v={op.t==="out"?"primary":op.t==="in"?"success":"secondary"} onClick={()=>setSheet(op.t)}>{op.l}</Btn>)}
        </div>}
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        {["all","out","in","return","writeoff"].map(t=><button key={t} onClick={()=>setTypeF(t)} style={{padding:"5px 12px",borderRadius:999,border:`1px solid ${typeF===t?"var(--ink)":"var(--brd)"}`,fontSize:12,fontWeight:typeF===t?600:400,background:typeF===t?"var(--ink-l)":"var(--sur)",color:typeF===t?"var(--ink)":"var(--tx2)",cursor:"pointer",transition:"all .12s"}}>{t==="all"?"Все":TL[t]}</button>)}
        <Sel value={brF} onChange={e=>setBrF(e.target.value)} style={{width:150,fontSize:12}}>
          <option value="">Все филиалы</option>{branches.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
        </Sel>
        <div style={{display:"flex",gap:6,marginLeft:"auto",alignItems:"center"}}>
          <Inp type="date" value={dateFrom} onChange={e=>setDF(e.target.value)} style={{width:128,fontSize:11}}/><span style={{color:"var(--tx3)"}}>—</span>
          <Inp type="date" value={dateTo} onChange={e=>setDT(e.target.value)} style={{width:128,fontSize:11}}/>
          <Inp value={search} onChange={e=>setSrch(e.target.value)} placeholder="Поиск…" pfx="🔍" style={{width:170}}/>
        </div>
      </div>
    </div>
    <div style={{flex:1,overflow:"auto",padding:18}}>
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"8px 16px",borderBottom:"1px solid var(--brd)",fontSize:11,color:"var(--tx3)"}}>Записей: {filtered.length}</div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:"var(--bg)"}}>{["Дата","Тип","Товар","Кол","Получатель","Поставщик","Филиал (Город)","СЗ","Цель"].map(h=><th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:10,fontWeight:600,color:"var(--tx3)",letterSpacing:".06em",textTransform:"uppercase",borderBottom:"1px solid var(--brd)",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>{filtered.map((m,i)=>{const br=branches.find(b=>b.id===m.branch_id);const sup=suppliers.find(s=>s.id===m.supplier_id);return<tr key={m.id} style={{background:i%2?"var(--bg)":"var(--sur)",transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background="var(--ink-l)"} onMouseLeave={e=>e.currentTarget.style.background=i%2?"var(--bg)":"var(--sur)"}>
            <td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:11,color:"var(--tx3)",borderBottom:"1px solid var(--brd)",whiteSpace:"nowrap"}}>{(m.created_at||m.date||"").slice(0,10)}</td>
            <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)"}}><TBadge type={m.type}/></td>
            <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",fontWeight:500,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pName(m.product_id)}</td>
            <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)"}}><span className="ff" style={{fontWeight:700,color:"var(--tx2)"}}>×{m.qty}</span></td>
            <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",color:"var(--tx2)",fontSize:12}}>{m.recipient_id?rName(m.recipient_id):"—"}</td>
            <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",color:"var(--tx2)",fontSize:12}}>{sup?.name||"—"}</td>
            <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",color:"var(--tx2)",fontSize:12}}>{br?`${br.name}${br.city?` (${br.city})`:""}`:"—"}</td>
            <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",fontSize:11,color:"var(--ink)",fontWeight:500}}>{m.sz||"—"}</td>
            <td style={{padding:"10px 14px",borderBottom:"1px solid var(--brd)",fontSize:12,color:"var(--tx3)",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.purpose||m.notes||"—"}</td>
          </tr>})}

    </button>})}</div>
    </div>
    <div style={{flex:1,overflow:"auto",padding:20}}>
      {branch&&<div className="card" style={{marginBottom:14,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div className="ff" style={{fontWeight:700,fontSize:15}}>{branch.name}, {branch.city}</div>
          {branch.head&&<div style={{fontSize:12,color:"var(--tx2)",marginTop:2}}>Руководитель: {branch.head}</div>}
        </div>
        <div style={{display:"flex",gap:8}}><Badge color="ink">{tQ} шт на руках</Badge><Badge color="green">{som(tV)}</Badge></div>
      </div>}

      {bOuts.length===0?<div style={{padding:60,textAlign:"center",color:"var(--tx3)"}}><div className="ff" style={{fontSize:40,marginBottom:10}}>✓</div><div className="ff" style={{fontSize:17,fontWeight:600,color:"var(--tx2)"}}>Нет активных выдач</div></div>:
      Object.entries(byRec).map(([rid,items])=>{const pQ=items.reduce((a,c)=>a+c.remaining,0);const pV=items.reduce((a,c)=>a+(products.find(p=>p.id===c.product_id)?.price||0)*c.remaining,0);return<div key={rid} className="card" style={{marginBottom:14,padding:0,overflow:"hidden"}}>

          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:"var(--ink)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:14}}>{rName(Number(rid))[0]}</div>
            <span className="ff" style={{fontWeight:700,fontSize:15}}>{rName(Number(rid))}</span>
          </div>

            <td style={{padding:"10px 14px"}}><Btn v="ghost" size="sm" onClick={()=>setConfirm(c)}>Вернуть</Btn></td>
          </tr>})}
          </tbody>
        </table>
      </div>})}
    </div>
  </div>

      {profiles.length===0?<div style={{padding:32,textAlign:"center",color:"var(--tx3)"}}>Нет профилей</div>:
      profiles.map((u,i)=>{const[rbg,rc]=RC[u.role]||RC.employee;return<div key={u.id} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 18px",borderBottom:i<profiles.length-1?"1px solid var(--brd)":"none",background:i%2?"var(--bg)":"var(--sur)"}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,var(--ink),var(--pu))",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:14,flexShrink:0}}>{(u.name||u.email||"?")[0].toUpperCase()}</div>
        <div style={{flex:1}}><div className="ff" style={{fontWeight:600,fontSize:13}}>{u.name||u.email}</div><div style={{fontSize:11,color:"var(--tx3)"}}>{branches.find(b=>b.id===u.branch_id)?.name||"—"}</div></div>
        <span style={{padding:"2px 10px",borderRadius:999,fontSize:11,fontWeight:600,background:rbg,color:rc}}>{ROLES[u.role]||u.role}</span>
      </div>})}
    </div>
  </div>
}

/* ══ SETTINGS VIEW ════════════════════════════════════════════════════ */
function SettingsView({S,refreshData}){
  const[tab,setTab]=useState("categories");const{toast,can}=S;

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>{categories.map(c=><div key={c.id} className="card" style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

      </>}
      {tab==="suppliers"&&<>
        <div className="card" style={{marginBottom:12,padding:"14px 18px"}}>

            <Fld label="Контакт"><Inp value={n.sup.contact} onChange={e=>upN("sup",{contact:e.target.value})} placeholder="+996..."/></Fld>
            <Fld label="ИНН"><Inp value={n.sup.inn} onChange={e=>upN("sup",{inn:e.target.value})}/></Fld>
            <div style={{marginTop:20}}><Btn onClick={()=>add("suppliers",{name:n.sup.name,contact:n.sup.contact,inn:n.sup.inn},"sup")}>+</Btn></div>
          </div>
        </div>
        <div className="card" style={{padding:0,overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr style={{background:"var(--bg)"}}>{["#","Название","Контакт","ИНН",""].map(h=><th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:10,fontWeight:600,color:"var(--tx3)",letterSpacing:".06em",textTransform:"uppercase",borderBottom:"1px solid var(--brd)"}}>{h}</th>)}</tr></thead>
        <tbody>{suppliers.map((s,i)=><tr key={s.id} style={{background:i%2?"var(--bg)":"var(--sur)",borderBottom:"1px solid var(--brd)"}}><td style={{padding:"10px 14px",color:"var(--tx3)"}}>{s.id}</td><td style={{padding:"10px 14px",fontWeight:600}}>{s.name}</td><td style={{padding:"10px 14px",color:"var(--tx2)"}}>{s.contact}</td><td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:11,color:"var(--tx3)"}}>{s.inn||"—"}</td><td style={{padding:"10px 14px"}}>{can("admin")&&<Btn v="ghost" size="sm" onClick={()=>del("suppliers",s.id)}>Удалить</Btn>}</td></tr>)}</tbody></table></div>
      </>}
      {tab==="directions"&&<>
        <div className="card" style={{marginBottom:12,padding:"12px 18px",display:"flex",gap:10,alignItems:"end"}}>
          <Fld label="Название направления" style={{flex:1}}><Inp value={n.dir.name} onChange={e=>upN("dir",{name:e.target.value})} onKeyDown={e=>e.key==="Enter"&&add("directions",{name:n.dir.name},"dir")}/></Fld>
          <Btn style={{marginTop:20}} onClick={()=>add("directions",{name:n.dir.name},"dir")}>+</Btn>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{directions.map(d=><div key={d.id} className="card" style={{padding:"7px 14px",borderRadius:999,display:"flex",alignItems:"center",gap:8,fontSize:13}}>
          <span className="ff" style={{fontWeight:500}}>{d.name}</span>{can("admin")&&<button onClick={()=>del("directions",d.id)} style={{color:"var(--tx3)",cursor:"pointer",fontSize:14}}>✕</button>}
        </div>)}</div>
      </>}
      {tab==="branches"&&<>
        <div className="card" style={{marginBottom:12,padding:"14px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr auto",gap:10,alignItems:"end"}}>
            <Fld label="Название"><Inp value={n.br.name} onChange={e=>upN("br",{name:e.target.value})}/></Fld>
            <Fld label="Город"><Inp value={n.br.city} onChange={e=>upN("br",{city:e.target.value})}/></Fld>
            <Fld label="Руководитель"><Inp value={n.br.head} onChange={e=>upN("br",{head:e.target.value})}/></Fld>
            <div style={{marginTop:20}}><Btn onClick={()=>add("branches",{name:n.br.name,city:n.br.city,head:n.br.head},"br")}>+</Btn></div>

/* ══ LOGIN ════════════════════════════════════════════════════════════ */
function Login({onLogin}){
  const[email,setE]=useState("");const[pass,setP]=useState("");const[err,setErr]=useState("");const[loading,setL]=useState(false);
  const submit=async()=>{if(!email||!pass){setErr("Заполните поля");return}setL(true);setErr("");const{data,error}=await sb.auth.signInWithPassword({email,password:pass});if(error){setErr(error.message);setL(false);return}const{data:p,error:pe}=await sb.from("profiles").select("*").eq("id",data.user.id).single();if(pe||!p){setErr("Профиль не найден. Обратитесь к администратору.");setL(false);return}onLogin(p);setL(false)};
  return<div style={{display:"flex",height:"100vh",background:"var(--bg)"}}>
    <div style={{margin:"auto",width:"100%",maxWidth:380,padding:20}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:56,height:56,background:"linear-gradient(135deg,var(--ink),var(--pu))",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 16px"}}>📦</div>
        <h1 className="ff" style={{fontSize:28,fontWeight:800,color:"var(--tx)",letterSpacing:"-.02em"}}>Учёт и Склад</h1>
        <p style={{fontSize:13,color:"var(--tx3)",marginTop:5}}>Департамент маркетинга</p>
      </div>
      <div className="card" style={{padding:"28px 28px"}}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Fld label="Email"><Inp value={email} onChange={e=>{setE(e.target.value);setErr("")}} placeholder="user@bank.kg" autoFocus onKeyDown={e=>e.key==="Enter"&&submit()}/></Fld>
          <Fld label="Пароль"><Inp type="password" value={pass} onChange={e=>{setP(e.target.value);setErr("")}} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&submit()}/></Fld>
          {err&&<div style={{padding:"9px 12px",background:"var(--rd-l)",borderRadius:9,fontSize:12,color:"var(--rd)"}}>⚠ {err}</div>}
          <Btn onClick={submit} loading={loading} size="lg" style={{borderRadius:10,marginTop:4}}>Войти в систему</Btn>
        </div>
      </div>
    </div>
  </div>
}

/* ══ APP ROOT ═════════════════════════════════════════════════════════ */
function App(){
  const[profile,setProfile]=useState(null);const[loading,setLoading]=useState(true);const[rtOn,setRtOn]=useState(false);
  const{ts,toast}=useToast();const[view,setView]=useState("home");
  const[data,setData]=useState({products:[],movements:[],branches:[],locations:[],suppliers:[],directions:[],categories:[],productTypes:[],recipients:[],profiles:[]});

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{if(session)loadProfile(session.user.id);else setLoading(false)});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{if(!s){setProfile(null);setLoading(false)}});
    return()=>subscription.unsubscribe();
  },[]);

  const loadProfile=async uid=>{const{data:p}=await sb.from("profiles").select("*").eq("id",uid).single();if(p)setProfile(p);setLoading(false)};

  const loadRefData=useCallback(async()=>{
    const tabs=["branches","locations","suppliers","directions","categories","product_types","recipients","profiles"];
    const res=await Promise.all(tabs.map(t=>sb.from(t).select("*")));
    const nd={};tabs.forEach((t,i)=>{nd[t==="product_types"?"productTypes":t]=res[i].data||[]});
    setData(prev=>({...prev,...nd}));
  },[]);

  useEffect(()=>{loadRefData()},[]);

  useEffect(()=>{
    if(!profile)return;
    const fetchAll=async()=>{
      const[{data:pr},{data:mv}]=await Promise.all([sb.from("products").select("*").eq("archived",false),sb.from("movements").select("*").order("created_at",{ascending:false})]);
      if(pr)setData(p=>({...p,products:pr}));if(mv)setData(p=>({...p,movements:mv}));
    };
    fetchAll();
    const pCh=sb.channel("p-rt").on("postgres_changes",{event:"*",schema:"public",table:"products"},e=>{setData(prev=>{const ps=prev.products;if(e.eventType==="INSERT")return{...prev,products:[...ps,e.new]};if(e.eventType==="UPDATE")return{...prev,products:ps.map(x=>x.id===e.new.id?e.new:x)};if(e.eventType==="DELETE")return{...prev,products:ps.filter(x=>x.id!==e.old.id)};return prev})}).subscribe(s=>setRtOn(s==="SUBSCRIBED"));
    const mCh=sb.channel("m-rt").on("postgres_changes",{event:"*",schema:"public",table:"movements"},e=>{setData(prev=>{const ms=prev.movements;if(e.eventType==="INSERT"){toast(`${TL[e.new.type]} зафиксирована`);return{...prev,movements:[e.new,...ms]}}if(e.eventType==="UPDATE")return{...prev,movements:ms.map(x=>x.id===e.new.id?e.new:x)};if(e.eventType==="DELETE")return{...prev,movements:ms.filter(x=>x.id!==e.old.id)};return prev})}).subscribe();
    return()=>{sb.removeChannel(pCh);sb.removeChannel(mCh);setRtOn(false)};
  },[profile]);

  const stock=useStock(data.movements);const checkouts=useCheckouts(data.movements);
  const overdue=useMemo(()=>checkouts.filter(c=>c.due_date&&c.due_date<TODAY),[checkouts]);
  /*
   * Матрица прав:
   *   admin    — всё, все филиалы
   *   director — просмотр всего (все филиалы), без операций и редактирования
   *   manager  — операции (Приход/Выдача/Возврат), добавление товаров, только свой филиал
   *   employee — только просмотр, только свой филиал
   */
  const can=useCallback(a=>{
    if(!profile)return false;
    const r=profile.role;
    switch(a){
      case "admin":     return r==="admin";
      case "settings":  return r==="admin";                          // справочники + пользователи
      case "reports":   return r==="admin"||r==="director";          // отчёты
      case "suppliers": return r==="admin"||r==="director";          // поставщики
      case "edit":      return r==="admin"||r==="manager";           // добавление товаров
      case "move":      return r==="admin"||r==="manager";           // операции (выдача/приход/возврат)
      case "branches":  return r==="admin"||r==="director"||r==="manager"; // раздел филиалов
      case "recipients":return r==="admin"||r==="director"||r==="manager";
      default:          return true;                                  // просмотр — все
    }
  },[profile]);

  // Ограничение по филиалу: manager и employee видят только свои данные
  const isRestricted = profile && (profile.role==="manager"||profile.role==="employee");
  const userBranchId = profile?.branch_id;

  const S={...data,profile,can,toast,isRestricted,userBranchId};
  const shared={S,stock,checkouts,overdue,setView};

  if(loading)return<div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,background:"var(--bg)"}}><Spin s={28}/><span className="ff" style={{fontSize:16,color:"var(--tx3)"}}>Загрузка...</span></div>;
  if(!profile)return<><Login onLogin={p=>{setProfile(p);toast("Добро пожаловать!")}}/><Toasts ts={ts}/></>;

  const NAV=[
    {id:"home",l:"Главная"},{id:"items",l:"Товары"},{id:"activity",l:"Движения",badge:overdue.length},
    {id:"branches",l:"Филиалы"},{id:"recipients",l:"Получатели"},
    ...(can("admin")||can("director")?[{id:"reports",l:"Отчёты"},{id:"suppliers",l:"Поставщики"},{id:"settings",l:"Справочники"},{id:"users",l:"Пользователи"}]:[])
  ];
  // sidebar uses groups internally

  // Защита роутов: если view недоступен для роли — сбрасываем на home
  const r=profile.role;
  const ALLOWED_VIEWS={
    admin:    ["home","items","activity","branches","recipients","reports","suppliers","settings","users"],
    director: ["home","items","activity","branches","recipients","reports","suppliers"],
    manager:  ["home","items","activity","branches","recipients"],
    employee: ["home","items","activity"],
  }[r]||["home","items","activity"];
  const safeView=ALLOWED_VIEWS.includes(view)?view:"home";

  const VIEWS={
    home:       <Home       {...shared}/>,
    items:      <ItemsView  {...shared}/>,
    activity:   <ActivityView {...shared}/>,
    branches:   <BranchesView {...shared}/>,
    recipients: <RecipientsView {...shared}/>,
    reports:    <ReportsView {...shared}/>,
    suppliers:  <SuppliersView {...shared}/>,
    settings:   <SettingsView {...shared} refreshData={loadRefData}/>,
    users:      <UsersView  {...shared}/>,
  };

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg)"}}>
    <Sidebar view={view} setView={setView} profile={profile} rtOn={rtOn} overdueCount={overdue.length}
      onLogout={async()=>{await sb.auth.signOut();setProfile(null);toast("До свидания!")}}/>
    <main style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
      {VIEWS[safeView]||<div style={{padding:40,textAlign:"center",color:"var(--tx3)"}}>Раздел недоступен</div>}
    </main>
    <Toasts ts={ts}/>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
